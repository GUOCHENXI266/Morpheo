            checkCollision(playerX, playerY, playerWidth, playerHeight) {
                if (this.collected) return false;

                const dx = playerX + playerWidth / 2 - this.x;
                const dy = playerY + playerHeight / 2 - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                return dist < 35;
            }
        }

        // ==================== 危险物类 ====================
        class Hazard {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.time = Math.random() * Math.PI * 2;
            }

            update(time) {
                this.time += 0.05;
            }

            draw(ctx, cameraX) {
                const screenX = this.x - cameraX;
                if (screenX < -50 || screenX > ctx.canvas.width + 50) return;

                ctx.save();
                ctx.translate(screenX, this.y);

                // 绘制尖刺
                const spikeHeight = 30;
                const spikeWidth = 20;

                // 阴影
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.beginPath();
                ctx.ellipse(0, spikeHeight + 5, spikeWidth / 2, 5, 0, 0, Math.PI * 2);
                ctx.fill();

                // 尖刺主体
                const gradient = ctx.createLinearGradient(0, 0, 0, spikeHeight);
                gradient.addColorStop(0, '#ff4444');
                gradient.addColorStop(0.5, '#cc0000');
                gradient.addColorStop(1, '#990000');
                ctx.fillStyle = gradient;

                ctx.beginPath();
                ctx.moveTo(0, 0 + Math.sin(this.time) * 2);
                ctx.lineTo(-spikeWidth / 2, spikeHeight);
                ctx.lineTo(spikeWidth / 2, spikeHeight);
                ctx.closePath();
                ctx.fill();

                // 高光
                ctx.fillStyle = 'rgba(255, 100, 100, 0.6)';
                ctx.beginPath();
                ctx.moveTo(0, 5 + Math.sin(this.time) * 2);
                ctx.lineTo(-3, 15);
                ctx.lineTo(3, 15);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }

            checkCollision(playerX, playerY, playerWidth, playerHeight) {
                return playerX + playerWidth > this.x - 10 &&
                       playerX < this.x + 10 &&
                       playerY + playerHeight > this.y &&
                       playerY < this.y + 30;
            }
        }

        // ==================== 检查点类 ====================
        class Checkpoint {
            constructor(x, y, name, scene) {
                this.x = x;
                this.y = y;
                this.name = name;
                this.scene = scene;
                this.activated = false;
                this.time = 0;
                this.sparkles = [];

                // 初始化闪光粒子
                for (let i = 0; i < 6; i++) {
                    this.sparkles.push({
                        angle: (i / 6) * Math.PI * 2,
                        offset: Math.random() * Math.PI * 2
                    });
                }
            }

            update(time) {
                this.time += 0.05;
            }

            draw(ctx, cameraX) {
                const screenX = this.x - cameraX;
                if (screenX < -100 || screenX > ctx.canvas.width + 100) return;

                ctx.save();
                ctx.translate(screenX, this.y);

                // 底座阴影
                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.beginPath();
                ctx.ellipse(0, 60, 25, 8, 0, 0, Math.PI * 2);
                ctx.fill();

                // 旗杆
                const poleGradient = ctx.createLinearGradient(-2, 0, 2, 60);
                poleGradient.addColorStop(0, '#e0e0e0');
                poleGradient.addColorStop(0.5, '#bdbdbd');
                poleGradient.addColorStop(1, '#9e9e9e');
                ctx.fillStyle = poleGradient;
                ctx.fillRect(-2, 0, 4, 60);

                // 旗杆高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.fillRect(-1, 0, 1, 58);

                // 旗帜（飘动效果）
                const waveOffset = Math.sin(this.time * 2) * 3;
                const flagColor = this.activated ? '#4caf50' : '#ffd700';
                const flagGradient = ctx.createLinearGradient(0, -20, 30 + waveOffset, -20);
                flagGradient.addColorStop(0, flagColor);
                flagGradient.addColorStop(1, this.activated ? '#81c784' : '#ffeb3b');
                ctx.fillStyle = flagGradient;

                ctx.beginPath();
                ctx.moveTo(0, -5);
                ctx.lineTo(0, -35);
                ctx.quadraticCurveTo(15, -33 + waveOffset, 30 + waveOffset, -35);
                ctx.quadraticCurveTo(15, -23 - waveOffset, 0, -20);
                ctx.closePath();
                ctx.fill();

                // 旗帜边框
                ctx.strokeStyle = this.activated ? '#388e3c' : '#fbc02d';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // 旗帜上的图标
                ctx.fillStyle = 'white';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.activated ? '✓' : '?', 15, -27);

                // 已激活时的闪光效果
                if (this.activated) {
                    this.sparkles.forEach((sparkle, i) => {
                        const sparkleAngle = sparkle.angle + this.time + sparkle.offset;
                        const sparkleRadius = 35 + Math.sin(this.time * 3 + i) * 3;
                        const sx = Math.cos(sparkleAngle) * sparkleRadius;
                        const sy = Math.sin(sparkleAngle) * sparkleRadius - 20;

                        ctx.fillStyle = 'rgba(255, 215, 0, ' + (0.5 + Math.sin(this.time * 4 + i) * 0.3) + ')';
                        ctx.beginPath();
                        ctx.arc(sx, sy, 2, 0, Math.PI * 2);
                        ctx.fill();
                    });
                }

                // 底座
                ctx.fillStyle = '#757575';
                ctx.beginPath();
                ctx.ellipse(0, 60, 20, 6, 0, 0, Math.PI * 2);
                ctx.fill();

                // 名称标签（半透明背景）
                if (screenX > 100 && screenX < ctx.canvas.width - 100) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                    ctx.fillRect(-40, -50, 80, 20);

                    ctx.fillStyle = 'white';
                    ctx.font = '12px "Quicksand", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.name, 0, -40);
                }

                ctx.restore();
            }

            checkActivation(playerX, playerY, playerWidth, playerHeight) {
                if (this.activated) return false;

                const dx = Math.abs(playerX + playerWidth / 2 - this.x);
                const dy = Math.abs(playerY + playerHeight / 2 - this.y);

                if (dx < 50 && dy < 80) {
                    this.activated = true;
                    return true;
                }
                return false;
            }
        }

        // ==================== 玩家类 ====================
        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 40;
                this.height = 50;
                this.speed = 6;
                this.velX = 0;
                this.velY = 0;
                this.jumping = false;
                this.grounded = false;
                this.gravity = 1.0;          // 马里奥风格：高重力（微调）
                this.jumpPower = 15;
                this.friction = 0.88;        // 马里奥风格：适中摩擦
                this.airControl = 0.8;       // 马里奥风格：强空中控制
                this.direction = 1;

                // 动画状态
                this.walkCycle = 0;
                this.breatheCycle = 0;
                this.landingSquish = 0;
                this.lastGrounded = false;

                // 形象混合
                this.morphRatio = 0; // 0=奶油, 1=巧克力, 2=抹茶, 3=草莓, 4=天空, 5=珠宝, 6=酒水, 7=化妆室
            }

            update(keys, platforms) {
                // 移动输入（马里奥风格：空中控制减弱）
                const acceleration = this.grounded ? 1 : (1 * this.airControl);

                if (keys['ArrowLeft'] || keys['a']) {
                    this.velX -= acceleration;
                    this.direction = -1;
                }
                if (keys['ArrowRight'] || keys['d']) {
                    this.velX += acceleration;
                    this.direction = 1;
                }

                this.velX *= this.friction;
                this.x += this.velX;

                // 重力
                this.velY += this.gravity;
                this.y += this.velY;

                // 限速
                if (Math.abs(this.velX) > this.speed) {
                    this.velX = this.speed * Math.sign(this.velX);
                }

                // 平台碰撞
                this.grounded = false;
                let standingPlatform = null;

                platforms.forEach((platform) => {
                    if (this.x + this.width > platform.x &&
                        this.x < platform.x + platform.width &&
                        this.y + this.height > platform.y &&
                        this.y + this.height < platform.y + platform.height &&
                        this.velY >= 0) {

                        this.y = platform.y - this.height;
                        this.velY = 0;
                        this.grounded = true;
                        this.jumping = false;
                        standingPlatform = platform;

                        // 着陆效果
                        if (!this.lastGrounded) {
                            this.landingSquish = 10;
                            return true; // 信号产生着陆粒子
                        }
                    }
                });

                // 如果站在移动平台上，跟随平台移动
                if (standingPlatform && standingPlatform.moving) {
                    const deltaX = standingPlatform.x - standingPlatform.lastX;
                    const deltaY = standingPlatform.y - standingPlatform.lastY;
                    this.x += deltaX;
                    this.y += deltaY;
                }

                this.lastGrounded = this.grounded;

                // 动画更新
                if (Math.abs(this.velX) > 0.5 && this.grounded) {
                    this.walkCycle += 0.3;
                }
                this.breatheCycle += 0.05;
                if (this.landingSquish > 0) {
                    this.landingSquish -= 0.5;
                }

                // 更新形象混合比例（平滑过渡）
                // 0=奶油, 1=巧克力, 2=抹茶, 3=草莓, 4=天空, 5=珠宝, 6=酒水, 7=化妆室
                let targetMorph = 0;
                if (this.x > 18000) {
                    targetMorph = 7; // 化妆室
                } else if (this.x > 17600) {
                    // 过渡区域 17600-18000 (酒水->化妆室)
                    targetMorph = 6 + (this.x - 17600) / 400;
                } else if (this.x > 15500) {
                    targetMorph = 6; // 酒水
                } else if (this.x > 15100) {
                    // 过渡区域 15100-15500 (珠宝->酒水)
                    targetMorph = 5 + (this.x - 15100) / 400;
                } else if (this.x > 13000) {
                    targetMorph = 5; // 珠宝
                } else if (this.x > 12600) {
                    // 过渡区域 12600-13000 (天空->珠宝)
                    targetMorph = 4 + (this.x - 12600) / 400;
                } else if (this.x > 10500) {
                    targetMorph = 4; // 天空
                } else if (this.x > 10100) {
                    // 过渡区域 10100-10500 (草莓->天空)
                    targetMorph = 3 + (this.x - 10100) / 400;
                } else if (this.x > 8000) {
                    targetMorph = 3; // 草莓
                } else if (this.x > 7600) {
                    // 过渡区域 7600-8000 (抹茶->草莓)
                    targetMorph = 2 + (this.x - 7600) / 400;
                } else if (this.x > 5500) {
                    targetMorph = 2; // 抹茶
                } else if (this.x > 5100) {
                    // 过渡区域 5100-5500 (巧克力->抹茶)
                    targetMorph = 1 + (this.x - 5100) / 400;
                } else if (this.x > 3200) {
                    targetMorph = 1; // 巧克力
                } else if (this.x > 2800) {
                    // 过渡区域 2800-3200 (奶油->巧克力)
                    targetMorph = (this.x - 2800) / 400;
                }

                this.morphRatio += (targetMorph - this.morphRatio) * 0.1;

                return false;
            }

            jump() {
                if (this.grounded && !this.jumping) {
                    this.jumping = true;
                    this.velY = -this.jumpPower;
                    this.grounded = false;
                    return true; // 信号产生跳跃粒子
                }
                return false;
            }

            getParticleColor() {
                // 根据玩家位置返回对应场景的粒子颜色（支持平滑过渡）
                if (this.x > 18000) {
                    // 化妆室区
                    return '#d0d0d0';
                } else if (this.x > 17600) {
                    // 酒水到化妆室过渡区
                    const ratio = (this.x - 17600) / 400;
                    return Utils.lerpColor('#1a1a1a', '#d0d0d0', ratio);
                } else if (this.x > 15500) {
                    // 酒水区
                    return '#1a1a1a';
                } else if (this.x > 15100) {
                    // 珠宝到酒水过渡区
                    const ratio = (this.x - 15100) / 400;
                    return Utils.lerpColor('#fff9c4', '#1a1a1a', ratio);
                } else if (this.x > 13000) {
                    // 珠宝区
                    return '#fff9c4';
                } else if (this.x > 12600) {
                    // 天空到珠宝过渡区
                    const ratio = (this.x - 12600) / 400;
                    return Utils.lerpColor('#90caf9', '#fff9c4', ratio);
                } else if (this.x > 10500) {
                    // 天空区
                    return '#90caf9';
                } else if (this.x > 10100) {
                    // 草莓到天空过渡区
                    const ratio = (this.x - 10100) / 400;
                    return Utils.lerpColor('#ffb3c1', '#90caf9', ratio);
                } else if (this.x > 8000) {
                    // 草莓区
                    return '#ffb3c1';
                } else if (this.x > 7600) {
                    // 抹茶到草莓过渡区
                    const ratio = (this.x - 7600) / 400;
                    return Utils.lerpColor('#8cc074', '#ffb3c1', ratio);
                } else if (this.x > 5500) {
                    // 抹茶区
                    return '#8cc074';
                } else if (this.x > 5100) {
                    // 巧克力到抹茶过渡区
                    const ratio = (this.x - 5100) / 400;
                    return Utils.lerpColor('#8d6e63', '#8cc074', ratio);
                } else if (this.x > 3200) {
                    // 巧克力区
                    return '#8d6e63';
                } else if (this.x > 2800) {
                    // 奶油到巧克力过渡区
                    const ratio = (this.x - 2800) / 400;
                    return Utils.lerpColor('#ffd1dc', '#8d6e63', ratio);
                } else {
                    // 奶油区
                    return '#ffd1dc';
                }
            }

            draw(ctx, cameraX, time) {
                const screenX = this.x - cameraX;
                const centerX = screenX + this.width / 2;
                const centerY = this.y + this.height / 2;

                // 应用着陆压缩效果
                const squish = this.landingSquish / 10;

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.scale(1 + squish * 0.2, 1 - squish * 0.3);
                ctx.translate(-centerX, -centerY);

                // 根据混合比例绘制
                // 使用更准确的场景判断
                const morphLevel = Math.floor(this.morphRatio);
                const morphProgress = this.morphRatio - morphLevel;

                if (morphLevel === 0) {
                    // 奶油到巧克力的过渡
                    this.drawMorphedCharacter(ctx, centerX, centerY, 'cream', 'chocolate', morphProgress);
                } else if (morphLevel === 1) {
                    // 巧克力到抹茶的过渡
                    this.drawMorphedCharacter(ctx, centerX, centerY, 'chocolate', 'matcha', morphProgress);
                } else if (morphLevel === 2) {
                    // 抹茶到草莓的过渡
                    this.drawMorphedCharacter(ctx, centerX, centerY, 'matcha', 'strawberry', morphProgress);
                } else if (morphLevel === 3) {
                    // 草莓到天空的过渡
                    this.drawMorphedCharacter(ctx, centerX, centerY, 'strawberry', 'sky', morphProgress);
                } else if (morphLevel === 4) {
                    // 天空到珠宝的过渡
                    this.drawMorphedCharacter(ctx, centerX, centerY, 'sky', 'jewelry', morphProgress);
                } else if (morphLevel === 5) {
                    // 珠宝到酒水的过渡
                    this.drawMorphedCharacter(ctx, centerX, centerY, 'jewelry', 'beverage', morphProgress);
                } else if (morphLevel === 6) {
                    // 酒水到化妆室的过渡
                    this.drawMorphedCharacter(ctx, centerX, centerY, 'beverage', 'makeup', morphProgress);
                } else {
                    // 纯化妆室
                    this.drawMorphedCharacter(ctx, centerX, centerY, 'makeup', 'makeup', 0);
                }

                ctx.restore();
            }

            drawMorphedCharacter(ctx, centerX, centerY, theme1, theme2, ratio) {
                const themes = {
                    cream: {
                        body: '#fffef7',
                        bodyLight: '#ffffff',
                        bodyDark: '#fef9e7',
                        head: '#ffd1e8',
                        accent: '#ff6b9d',
                        headType: 'cake'
                    },
                    chocolate: {
                        body: '#6d4c41',
                        bodyLight: '#8d6e63',
                        bodyDark: '#5d4037',
                        head: '#5d4037',
                        accent: '#ffd700',
                        headType: 'cake'
                    },
                    matcha: {
                        body: '#8cc074',
                        bodyLight: '#a8d58a',
                        bodyDark: '#6fa854',
                        head: '#7bcd32',
                        accent: '#5fa826',
                        headType: 'donut'
                    },
                    strawberry: {
                        body: '#ffb3c1',
                        bodyLight: '#ffd4e0',
                        bodyDark: '#ff8fa3',
                        head: '#ff6b8a',
                        accent: '#4caf50',
                        headType: 'strawberry'
                    },
                    sky: {
                        body: '#90caf9',
                        bodyLight: '#bbdefb',
                        bodyDark: '#64b5f6',
                        head: '#ffffff',
                        accent: '#ffd700',
                        headType: 'star'
                    },
                    jewelry: {
                        body: '#fff9c4',
                        bodyLight: '#fffde7',
                        bodyDark: '#fff59d',
                        head: '#ffffff',
                        accent: '#ffd700',
                        headType: 'diamond'
                    },
                    beverage: {
                        body: '#1a1a1a',
                        bodyLight: '#2a2a2a',
                        bodyDark: '#000000',
                        head: '#c62828',
                        accent: '#8b0000',
                        headType: 'wineglass'
                    },
                    makeup: {
                        body: '#e8e8e8',
                        bodyLight: '#f5f5f5',
                        bodyDark: '#d0d0d0',
                        head: '#f8e0ff',
                        accent: '#d4af37',
                        headType: 'perfume'
                    }
                };

                const color1 = themes[theme1];
                const color2 = themes[theme2];

                // 混合颜色
                const bodyColor = Utils.lerpColor(color1.body, color2.body, ratio);
                const bodyLight = Utils.lerpColor(color1.bodyLight, color2.bodyLight, ratio);
                const bodyDark = Utils.lerpColor(color1.bodyDark, color2.bodyDark, ratio);
                const headColor = Utils.lerpColor(color1.head, color2.head, ratio);
                const accentColor = Utils.lerpColor(color1.accent, color2.accent, ratio);

                // 呼吸效果
                const breathe = Math.sin(this.breatheCycle) * 2;

                ctx.save();

                // === 身体 ===
                const bodyGradient = ctx.createRadialGradient(
                    centerX - 4, centerY - 4 + breathe, 0,
                    centerX, centerY + breathe, 16
                );
                bodyGradient.addColorStop(0, bodyLight);
                bodyGradient.addColorStop(0.7, bodyColor);
                bodyGradient.addColorStop(1, bodyDark);
                ctx.fillStyle = bodyGradient;
                ctx.beginPath();
                ctx.arc(centerX, centerY + 5 + breathe, 16, 0, Math.PI * 2);
                ctx.fill();

                // 身体高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.ellipse(centerX - 5, centerY + breathe, 7, 5, -0.3, 0, Math.PI * 2);
                ctx.fill();

                // === 头部 ===
                ctx.save();
                ctx.translate(centerX, centerY - 22);

                // 判断头部类型
                let headType = 'cake'; // 默认蛋糕

                // 优先判断当前处于哪个场景（ratio接近0时以theme1为准）
                if (ratio < 0.1) {
                    // 玩家在某个场景的起点，以theme1为准
                    if (theme1 === 'makeup') {
                        headType = 'perfume';
                    } else if (theme1 === 'beverage') {
                        headType = 'wineglass';
                    } else if (theme1 === 'jewelry') {
                        headType = 'diamond';
                    } else if (theme1 === 'sky') {
                        headType = 'star';
                    } else if (theme1 === 'strawberry') {
                        headType = 'strawberry';
                    } else if (theme1 === 'matcha') {
                        headType = 'donut';
                    } else if (theme1 === 'chocolate') {
                        headType = 'chocolate';
                    } else {
                        headType = 'cake'; // cream
                    }
                } else {
                    // 过渡状态，根据目标场景判断
                    if ((theme2 === 'makeup' && ratio > 0.5) || (theme1 === 'makeup' && theme2 === 'makeup')) {
                        headType = 'perfume';
                    } else if ((theme2 === 'beverage' && ratio > 0.5) || (theme1 === 'beverage' && theme2 === 'beverage')) {
                        headType = 'wineglass';
                    } else if ((theme2 === 'jewelry' && ratio > 0.5) || (theme1 === 'jewelry' && theme2 === 'jewelry')) {
                        headType = 'diamond';
                    } else if ((theme2 === 'sky' && ratio > 0.5) || (theme1 === 'sky' && theme2 === 'sky')) {
                        headType = 'star';
                    } else if ((theme2 === 'strawberry' && ratio > 0.5) || (theme1 === 'strawberry' && theme2 === 'strawberry')) {
                        headType = 'strawberry';
                    } else if ((theme2 === 'matcha' && ratio > 0.5) || (theme1 === 'matcha' && theme2 === 'matcha')) {
                        headType = 'donut';
                    } else if ((theme2 === 'chocolate' && ratio > 0.5) || (theme1 === 'chocolate' && theme2 === 'chocolate')) {
                        headType = 'chocolate';
                    } else if (theme1 === 'cream' || theme2 === 'cream') {
                        headType = 'cake';
                    }
                }

                if (headType === 'perfume') {
                    this.drawPerfumeHead(ctx, headColor, accentColor);
                } else if (headType === 'wineglass') {
                    this.drawWineGlassHead(ctx, headColor, accentColor);
                } else if (headType === 'diamond') {
                    this.drawDiamondHead(ctx, headColor, accentColor);
                } else if (headType === 'star') {
                    this.drawStarHead(ctx, headColor, accentColor);
                } else if (headType === 'strawberry') {
                    this.drawStrawberryHead(ctx, headColor, accentColor);
                } else if (headType === 'donut') {
                    this.drawDonutHead(ctx, headColor, accentColor, bodyColor);
                } else if (headType === 'chocolate') {
                    this.drawChocolateBlockHead(ctx, headColor, accentColor);
                } else {
                    this.drawCakeHead(ctx, headColor, accentColor, bodyColor);
                }

                ctx.restore();

                // === 手臂（带行走动画） ===
                const armSwing = Math.sin(this.walkCycle) * 0.3;
                ctx.strokeStyle = bodyColor;
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';

                // 左臂
                ctx.beginPath();
                ctx.moveTo(centerX - 14, centerY + 2);
                ctx.lineTo(centerX - 22, centerY + 10 + armSwing * 10);
                ctx.stroke();

                // 右臂
                ctx.beginPath();
                ctx.moveTo(centerX + 14, centerY + 2);
                ctx.lineTo(centerX + 22, centerY + 10 - armSwing * 10);
                ctx.stroke();

                // === 腿部（带行走动画） ===
                const legSwing = Math.sin(this.walkCycle) * 0.4;

                // 左腿
                ctx.beginPath();
                ctx.moveTo(centerX - 6, centerY + 18);
                ctx.lineTo(centerX - 10 - legSwing * 5, centerY + 33);
                ctx.stroke();

                // 右腿
                ctx.beginPath();
                ctx.moveTo(centerX + 6, centerY + 18);
                ctx.lineTo(centerX + 10 + legSwing * 5, centerY + 33);
                ctx.stroke();

                ctx.restore();
            }

            drawCakeHead(ctx, headColor, accentColor, bodyColor) {
                // 蛋糕体
                const headGradient = ctx.createLinearGradient(-12, -5, 12, -5);
                headGradient.addColorStop(0, headColor);
                headGradient.addColorStop(0.5, bodyColor);
                headGradient.addColorStop(1, headColor);
                ctx.fillStyle = headGradient;
                ctx.beginPath();
                ctx.roundRect(-12, -5, 24, 13, 3);
                ctx.fill();

                // 装饰（顶部点缀）
                ctx.fillStyle = accentColor;
                ctx.beginPath();
                ctx.arc(0, -11, 3, 0, Math.PI * 2);
                ctx.fill();

                // 高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(-1, -12, 1.2, 0, Math.PI * 2);
                ctx.fill();
            }

            drawDonutHead(ctx, headColor, accentColor, bodyColor) {
                // 甜甜圈主体（外圈）
                const donutGradient = ctx.createRadialGradient(-2, -2, 2, 0, 0, 12);
                donutGradient.addColorStop(0, '#d4a373');
                donutGradient.addColorStop(0.5, '#c19a6b');
                donutGradient.addColorStop(1, '#a67c52');
                ctx.fillStyle = donutGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 12, 0, Math.PI * 2);
                ctx.arc(0, 0, 5, 0, Math.PI * 2, true);
                ctx.fill();

                // 抹茶糖霜（流淌效果）
                ctx.save();
                ctx.beginPath();
                ctx.arc(0, 0, 12, 0, Math.PI * 2);
                ctx.arc(0, 0, 5, 0, Math.PI * 2, true);
                ctx.clip();

                const glazeGradient = ctx.createLinearGradient(0, -12, 0, 0);
                glazeGradient.addColorStop(0, headColor);
                glazeGradient.addColorStop(0.6, accentColor);
                glazeGradient.addColorStop(1, 'rgba(123, 205, 50, 0.7)');
                ctx.fillStyle = glazeGradient;

                ctx.beginPath();
                ctx.moveTo(-12, -5);
                for (let i = 0; i <= 8; i++) {
                    const angle = (i / 8) * Math.PI * 2 - Math.PI / 2;
                    const r = 12;
                    const x = Math.cos(angle) * r;
                    const y = Math.sin(angle) * r + Math.sin(i * 0.9) * 2 - 3;
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.lineTo(12, 12);
                ctx.lineTo(-12, 12);
                ctx.closePath();
                ctx.fill();
                ctx.restore();

                // 内圈阴影
                const innerGradient = ctx.createRadialGradient(0, 0, 5, 0, 0, 7);
                innerGradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
                innerGradient.addColorStop(1, 'rgba(0, 0, 0, 0.2)');
                ctx.fillStyle = innerGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 7, 0, Math.PI * 2);
                ctx.fill();

                // 白色糖粒装饰
                const sprinkleCount = 10;
                for (let i = 0; i < sprinkleCount; i++) {
                    const angle = (i / sprinkleCount) * Math.PI * 2 + this.breatheCycle * 0.1;
                    const r = 8 + Math.sin(i * 2) * 2;
                    const x = Math.cos(angle) * r;
                    const y = Math.sin(angle) * r;

                    // 糖粒
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                    ctx.beginPath();
                    ctx.arc(x, y, 1, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 整体高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.beginPath();
                ctx.ellipse(-4, -5, 4, 2, -0.5, 0, Math.PI * 2);
                ctx.fill();
            }

            drawChocolateBlockHead(ctx, headColor, accentColor) {
                // 巧克力块主体（方形）
                const chocoGradient = ctx.createLinearGradient(-10, -10, 10, 10);
                chocoGradient.addColorStop(0, '#5d4037');
                chocoGradient.addColorStop(0.3, headColor);
                chocoGradient.addColorStop(0.6, '#5d4037');
                chocoGradient.addColorStop(1, '#4e342e');
                ctx.fillStyle = chocoGradient;
                ctx.fillRect(-10, -10, 20, 18);

                // 分块纹理（十字线）
                ctx.strokeStyle = 'rgba(62, 39, 35, 0.7)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, -10);
                ctx.lineTo(0, 8);
                ctx.moveTo(-10, -1);
                ctx.lineTo(10, -1);
                ctx.stroke();

                // 每个格子的高光
                ctx.fillStyle = 'rgba(141, 110, 99, 0.3)';
                for (let row = 0; row < 2; row++) {
                    for (let col = 0; col < 2; col++) {
                        const x = -8 + col * 10;
                        const y = -8 + row * 10;
                        ctx.beginPath();
                        ctx.fillRect(x, y, 6, 6);
                    }
                }

                // 整体高光
                const highlightGradient = ctx.createRadialGradient(-5, -6, 0, -3, -4, 10);
                highlightGradient.addColorStop(0, 'rgba(180, 140, 110, 0.6)');
                highlightGradient.addColorStop(1, 'rgba(180, 140, 110, 0)');
                ctx.fillStyle = highlightGradient;
                ctx.fillRect(-10, -10, 20, 18);

                // 顶部装饰（金色可可豆）
                ctx.fillStyle = accentColor;
                ctx.beginPath();
                ctx.ellipse(0, -12, 2.5, 3, 0, 0, Math.PI * 2);
                ctx.fill();

                // 可可豆高光
                ctx.fillStyle = 'rgba(255, 255, 200, 0.6)';
                ctx.beginPath();
                ctx.arc(-0.5, -13, 1, 0, Math.PI * 2);
                ctx.fill();
            }

            drawStrawberryHead(ctx, headColor, accentColor) {
                // 草莓主体
                const strawberryGradient = ctx.createRadialGradient(-2, -3, 0, 0, 0, 13);
                strawberryGradient.addColorStop(0, '#ff6b8a');
                strawberryGradient.addColorStop(0.5, headColor);
                strawberryGradient.addColorStop(1, '#d32f2f');
                ctx.fillStyle = strawberryGradient;

                // 绘制草莓形状（心形底部）
                ctx.beginPath();
                ctx.moveTo(0, -8);
                ctx.bezierCurveTo(-7, -8, -12, -2, -12, 3);
                ctx.bezierCurveTo(-12, 8, -6, 12, 0, 10);
                ctx.bezierCurveTo(6, 12, 12, 8, 12, 3);
                ctx.bezierCurveTo(12, -2, 7, -8, 0, -8);
                ctx.closePath();
                ctx.fill();

                // 草莓籽（黄色小点）
                ctx.fillStyle = '#ffe082';
                const seeds = [
                    [-6, -2], [-3, 0], [0, 2], [3, 0], [6, -2],
                    [-4, 4], [0, 6], [4, 4], [-2, -4], [2, -4]
                ];
                seeds.forEach(([x, y]) => {
                    ctx.beginPath();
                    ctx.ellipse(x, y, 1, 0.8, 0, 0, Math.PI * 2);
                    ctx.fill();
                });

                // 草莓叶子（顶部）
                ctx.fillStyle = accentColor; // 绿色
                ctx.beginPath();
                // 左叶
                ctx.moveTo(-8, -8);
                ctx.quadraticCurveTo(-10, -12, -6, -11);
                ctx.lineTo(-4, -8);
                // 中叶
                ctx.moveTo(-2, -8);
                ctx.quadraticCurveTo(-2, -14, 0, -13);
                ctx.quadraticCurveTo(2, -14, 2, -8);
                // 右叶
                ctx.moveTo(4, -8);
                ctx.quadraticCurveTo(10, -12, 6, -11);
                ctx.lineTo(8, -8);
                ctx.fill();

                // 叶子纹理
                ctx.strokeStyle = 'rgba(76, 175, 80, 0.6)';
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                ctx.moveTo(-6, -11);
                ctx.lineTo(-5, -9);
                ctx.moveTo(0, -13);
                ctx.lineTo(0, -9);
                ctx.moveTo(6, -11);
                ctx.lineTo(5, -9);
                ctx.stroke();

                // 高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.ellipse(-5, -3, 3, 4, -0.3, 0, Math.PI * 2);
                ctx.fill();
            }

            drawStarHead(ctx, headColor, accentColor) {
                // 五角星主体
                const starGradient = ctx.createRadialGradient(-2, -2, 0, 0, 0, 14);
                starGradient.addColorStop(0, '#ffffff');
                starGradient.addColorStop(0.6, headColor);
                starGradient.addColorStop(1, '#e3f2fd');
                ctx.fillStyle = starGradient;

                // 绘制五角星
                ctx.beginPath();
                const spikes = 5;
                const outerRadius = 12;
                const innerRadius = 5;

                for (let i = 0; i < spikes * 2; i++) {
                    const radius = i % 2 === 0 ? outerRadius : innerRadius;
                    const angle = (i * Math.PI) / spikes - Math.PI / 2;
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;

                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();
                ctx.fill();

                // 星星边缘
                ctx.strokeStyle = '#bbdefb';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // 星星中心装饰（金色圆）
                const centerGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 3);
                centerGradient.addColorStop(0, '#ffd700');
                centerGradient.addColorStop(1, accentColor);
                ctx.fillStyle = centerGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 3, 0, Math.PI * 2);
                ctx.fill();

                // 闪光效果
                ctx.save();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';

                // 交叉闪光
                ctx.beginPath();
                ctx.moveTo(0, -14);
                ctx.lineTo(0, 14);
                ctx.moveTo(-14, 0);
                ctx.lineTo(14, 0);
                ctx.stroke();

                // 对角闪光
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(-10, -10);
                ctx.lineTo(10, 10);
                ctx.moveTo(10, -10);
                ctx.lineTo(-10, 10);
                ctx.stroke();

                ctx.restore();

                // 高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.beginPath();
                ctx.arc(-4, -5, 2, 0, Math.PI * 2);
                ctx.fill();
            }

            drawDiamondHead(ctx, headColor, accentColor) {
                // 钻石主体（菱形）- 纯白色
                const diamondGradient = ctx.createLinearGradient(0, -12, 0, 12);
                diamondGradient.addColorStop(0, '#ffffff');
                diamondGradient.addColorStop(0.3, '#fafafa');
                diamondGradient.addColorStop(0.6, '#f0f0f0');
                diamondGradient.addColorStop(1, '#e8e8e8');
                ctx.fillStyle = diamondGradient;

                // 钻石形状（上半部分）
                ctx.beginPath();
                ctx.moveTo(0, -12); // 顶点
                ctx.lineTo(-8, -4); // 左上
                ctx.lineTo(-10, 2); // 左中
                ctx.lineTo(0, 12); // 底点
                ctx.lineTo(10, 2); // 右中
                ctx.lineTo(8, -4); // 右上
                ctx.closePath();
                ctx.fill();

                // 钻石切面（多个三角形）
                ctx.strokeStyle = 'rgba(200, 200, 255, 0.5)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(0, -12);
                ctx.lineTo(0, 12);
                ctx.moveTo(-8, -4);
                ctx.lineTo(0, 12);
                ctx.moveTo(8, -4);
                ctx.lineTo(0, 12);
                ctx.moveTo(-10, 2);
                ctx.lineTo(10, 2);
                ctx.stroke();

                // 上表面切面
                ctx.beginPath();
                ctx.moveTo(-8, -4);
                ctx.lineTo(0, -2);
                ctx.lineTo(8, -4);
                ctx.moveTo(-10, 2);
                ctx.lineTo(0, -2);
                ctx.lineTo(10, 2);
                ctx.stroke();

                // 钻石边缘高光
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, -12);
                ctx.lineTo(-8, -4);
                ctx.lineTo(-10, 2);
                ctx.moveTo(0, -12);
                ctx.lineTo(8, -4);
                ctx.lineTo(10, 2);
                ctx.stroke();

                // 顶部闪光
                const topGlowGradient = ctx.createRadialGradient(0, -8, 0, 0, -8, 6);
                topGlowGradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
                topGlowGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                ctx.fillStyle = topGlowGradient;
                ctx.beginPath();
                ctx.arc(0, -8, 6, 0, Math.PI * 2);
                ctx.fill();

                // 彩虹折射效果（小点）
                const prismColors = ['rgba(255, 100, 150, 0.4)', 'rgba(100, 150, 255, 0.4)', 'rgba(150, 255, 150, 0.4)'];
                prismColors.forEach((color, i) => {
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(-6 + i * 6, 0, 2, 0, Math.PI * 2);
                    ctx.fill();
                });

                // 主高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.beginPath();
                ctx.arc(-3, -6, 3, 0, Math.PI * 2);
                ctx.fill();
            }

            drawWineGlassHead(ctx, headColor, accentColor) {
                // 酒杯杯身（三角形杯形）
                const glassGradient = ctx.createLinearGradient(-8, -10, 8, -10);
                glassGradient.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
                glassGradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.6)');
                glassGradient.addColorStop(1, 'rgba(255, 255, 255, 0.3)');
                ctx.fillStyle = glassGradient;
                ctx.strokeStyle = '#cccccc';
                ctx.lineWidth = 1.5;

                // 杯口
                ctx.beginPath();
                ctx.ellipse(0, -10, 8, 2, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // 杯身
                ctx.beginPath();
                ctx.moveTo(-8, -10);
                ctx.lineTo(-3, 2);
                ctx.lineTo(3, 2);
                ctx.lineTo(8, -10);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // 杯脚
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.strokeStyle = '#cccccc';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(-1, 2);
                ctx.lineTo(-1, 6);
                ctx.lineTo(1, 6);
                ctx.lineTo(1, 2);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // 杯底
                ctx.beginPath();
                ctx.ellipse(0, 6, 4, 1.5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // 红酒液体
                const wineGradient = ctx.createLinearGradient(0, -4, 0, 2);
                wineGradient.addColorStop(0, headColor);
                wineGradient.addColorStop(0.5, '#8b0000');
                wineGradient.addColorStop(1, '#5c0000');
                ctx.fillStyle = wineGradient;

                // 酒液形状（梯形）
                ctx.beginPath();
                ctx.moveTo(-6, -4);
                ctx.lineTo(-3, 1);
                ctx.lineTo(3, 1);
                ctx.lineTo(6, -4);
                ctx.closePath();
                ctx.fill();

                // 酒液表面（椭圆）
                const surfaceGradient = ctx.createRadialGradient(0, -4, 0, 0, -4, 6);
                surfaceGradient.addColorStop(0, '#a00000');
                surfaceGradient.addColorStop(1, headColor);
                ctx.fillStyle = surfaceGradient;
                ctx.beginPath();
                ctx.ellipse(0, -4, 6, 1.5, 0, 0, Math.PI * 2);
                ctx.fill();

                // 酒液边缘高光
                ctx.strokeStyle = 'rgba(139, 0, 0, 0.8)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.ellipse(0, -4, 6, 1.5, 0, 0, Math.PI);
                ctx.stroke();

                // 杯身高光
                const highlightGradient = ctx.createRadialGradient(-5, -6, 0, -5, -6, 8);
                highlightGradient.addColorStop(0, 'rgba(255, 255, 255, 0.7)');
                highlightGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                ctx.fillStyle = highlightGradient;
                ctx.beginPath();
                ctx.arc(-5, -6, 5, 0, Math.PI * 2);
                ctx.fill();

                // 杯口反光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.beginPath();
                ctx.ellipse(0, -10, 6, 1.5, 0, 0, Math.PI);
                ctx.fill();
            }

            drawPerfumeHead(ctx, headColor, accentColor) {
                // 香水瓶主体
                const bottleGradient = ctx.createLinearGradient(-7, -10, 7, 10);
                bottleGradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                bottleGradient.addColorStop(0.3, headColor);
                bottleGradient.addColorStop(0.7, 'rgba(240, 224, 255, 0.7)');
                bottleGradient.addColorStop(1, 'rgba(200, 200, 220, 0.6)');
                ctx.fillStyle = bottleGradient;

                // 瓶身（弧形）
                ctx.beginPath();
                ctx.moveTo(-7, -2);
                ctx.quadraticCurveTo(-8, 4, -6, 8);
                ctx.lineTo(-4, 10);
                ctx.lineTo(4, 10);
                ctx.lineTo(6, 8);
                ctx.quadraticCurveTo(8, 4, 7, -2);
                ctx.closePath();
                ctx.fill();

                // 瓶身高光（镜面反射）
                const mirrorGradient = ctx.createLinearGradient(-6, -2, -2, 6);
                mirrorGradient.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
                mirrorGradient.addColorStop(0.4, 'rgba(255, 255, 255, 0.5)');
                mirrorGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                ctx.fillStyle = mirrorGradient;
                ctx.beginPath();
                ctx.moveTo(-6, -1);
                ctx.quadraticCurveTo(-7, 3, -5, 7);
                ctx.lineTo(-3, 7);
                ctx.quadraticCurveTo(-5, 3, -4, -1);
                ctx.closePath();
                ctx.fill();

                // 液体部分
                const liquidGradient = ctx.createLinearGradient(0, 0, 0, 8);
                liquidGradient.addColorStop(0, 'rgba(255, 200, 255, 0.6)');
                liquidGradient.addColorStop(1, 'rgba(255, 150, 255, 0.4)');
                ctx.fillStyle = liquidGradient;
                ctx.beginPath();
                ctx.moveTo(-6, 1);
                ctx.quadraticCurveTo(-7, 4, -5, 8);
                ctx.lineTo(-4, 9);
                ctx.lineTo(4, 9);
                ctx.lineTo(5, 8);
                ctx.quadraticCurveTo(7, 4, 6, 1);
                ctx.closePath();
                ctx.fill();

                // 瓶颈
                ctx.fillStyle = 'rgba(200, 200, 200, 0.6)';
                ctx.fillRect(-3, -6, 6, 4);

                // 瓶颈高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.fillRect(-2.5, -5.5, 1.5, 3);

                // 喷头（金色）
                const sprayGradient = ctx.createLinearGradient(-4, -12, 4, -6);
                sprayGradient.addColorStop(0, accentColor);
                sprayGradient.addColorStop(0.5, '#ffd700');
                sprayGradient.addColorStop(1, accentColor);
                ctx.fillStyle = sprayGradient;

                // 喷头底座
                ctx.fillRect(-4, -8, 8, 2);

                // 喷头管
                ctx.beginPath();
                ctx.moveTo(-2, -8);
                ctx.lineTo(-2.5, -10);
                ctx.lineTo(2.5, -10);
                ctx.lineTo(2, -8);
                ctx.closePath();
                ctx.fill();

                // 喷头顶部
                ctx.beginPath();
                ctx.arc(0, -11, 2.5, 0, Math.PI, true);
                ctx.fill();

                // 喷头高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.beginPath();
                ctx.arc(-1, -11, 1, 0, Math.PI * 2);
                ctx.fill();

                // 瓶身装饰标签
                ctx.strokeStyle = accentColor;
                ctx.lineWidth = 1;
                ctx.strokeRect(-5, 2, 10, 4);

                // 标签细节
                ctx.fillStyle = accentColor;
                ctx.fillRect(-4, 3, 8, 0.5);
                ctx.fillRect(-4, 5, 8, 0.5);

                // 整体光泽效果
                const glossGradient = ctx.createRadialGradient(3, -1, 0, 3, -1, 6);
                glossGradient.addColorStop(0, 'rgba(255, 255, 255, 0.4)');
                glossGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                ctx.fillStyle = glossGradient;
                ctx.beginPath();
                ctx.arc(3, -1, 5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ==================== 相机类 ====================
        class Camera {
            constructor() {
                this.x = 0;
                this.y = 0;
                this.smoothness = 0.1;
                this.shake = 0;
                this.shakeDecay = 0.9;
            }

            update(targetX, targetY, canvasWidth) {
                const idealX = targetX - canvasWidth / 3;
                this.x += (idealX - this.x) * this.smoothness;

                // 抖动
                if (this.shake > 0) {
                    this.x += (Math.random() - 0.5) * this.shake;
                    this.y += (Math.random() - 0.5) * this.shake;
                    this.shake *= this.shakeDecay;
                    if (this.shake < 0.1) this.shake = 0;
                }
            }

            addShake(amount) {
                this.shake = Math.max(this.shake, amount);
            }
        }

        // ==================== 背景类 ====================
        class Background {
            constructor(canvasWidth, canvasHeight) {
                this.stars = [];
                this.layers = [
                    { parallax: 0.1, count: 30 },
                    { parallax: 0.2, count: 30 },
                    { parallax: 0.3, count: 20 }
                ];

                // 初始化星星
                this.layers.forEach(layer => {
                    for (let i = 0; i < layer.count; i++) {
                        this.stars.push({
                            x: Math.random() * 20500,
                            y: Math.random() * canvasHeight,
                            size: Math.random() * 3 + 1,
                            parallax: layer.parallax,
                            twinkle: Math.random() * Math.PI * 2,
                            speed: Math.random() * 0.3 + 0.1
                        });
                    }
                });
            }

            update() {
                this.stars.forEach(star => {
                    star.twinkle += 0.05;
                    star.y += star.speed;
                    if (star.y > 700) {
                        star.y = 0;
                        star.x = Math.random() * 20500;
                    }
                });
            }

            draw(ctx, cameraX, playerX) {
                // 计算背景颜色（根据场景）
                const sceneIndex = CONFIG.scenes.findIndex(s => playerX >= s.start && playerX < s.end);
                const scene = sceneIndex >= 0 ? CONFIG.scenes[sceneIndex] : null;
                let bgColors;

                if (scene && scene.name === 'transition') {
                    // 过渡区域：混合颜色
                    const prevScene = CONFIG.scenes[sceneIndex - 1];
                    const nextScene = CONFIG.scenes[sceneIndex + 1];

                    if (prevScene && nextScene && prevScene.bgColors && nextScene.bgColors) {
                        const ratio = (playerX - scene.start) / (scene.end - scene.start);
                        bgColors = prevScene.bgColors.map((color, i) =>
                            Utils.lerpColor(color, nextScene.bgColors[i], ratio)
                        );
                    } else {
                        // 如果没有相邻场景，使用默认颜色
                        bgColors = CONFIG.scenes[0].bgColors;
                    }
                } else if (scene && scene.bgColors) {
                    bgColors = scene.bgColors;
                } else {
                    bgColors = CONFIG.scenes[0].bgColors;
                }

                // 绘制渐变背景
                const gradient = ctx.createLinearGradient(0, 0, 0, ctx.canvas.height);
                bgColors.forEach((color, i) => {
                    gradient.addColorStop(i * 0.5, color);
                });
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);

                // 绘制星星（多层视差）
                this.stars.forEach(star => {
                    const screenX = star.x - cameraX * star.parallax;
                    if (screenX > -20 && screenX < ctx.canvas.width + 20) {
                        const alpha = 0.3 + Math.sin(star.twinkle) * 0.3;
                        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                        ctx.beginPath();
                        ctx.arc(screenX, star.y, star.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
            }
        }

        // ==================== 游戏主类 ====================
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');

                this.time = 0;
                this.running = true;
                this.keys = {};
                this.score = 0;
                this.combo = 0;
                this.comboTimer = 0;
                this.comboMaxTime = 180; // 3秒

                // 游戏对象
                this.player = new Player(100, 500);
                this.camera = new Camera();
                this.background = new Background(this.canvas.width, this.canvas.height);
                this.particleSystem = new ParticleSystem();

                // 创建游戏对象
                this.platforms = CONFIG.platforms.map(p => new Platform(p));
                this.collectibles = [
                    ...CONFIG.collectibles.bows.map(b => new Collectible(b.x, b.y, 'bow', b.theme)),
                    ...CONFIG.collectibles.candies.map(c => new Collectible(c.x, c.y, 'candy', c.theme))
                ];
                this.hazards = CONFIG.hazards.map(h => new Hazard(h.x, h.y, h.type));
                this.checkpoints = CONFIG.checkpoints.map(cp => new Checkpoint(cp.x, cp.y, cp.name, cp.scene));

                // 检查点系统
                this.currentCheckpoint = null; // 当前激活的检查点

                this.setupEventListeners();
                this.gameLoop();
            }

            setupEventListeners() {
                document.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                    this.keys[e.key.toLowerCase()] = true;

                    if ((e.key === ' ' || e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp')) {
                        if (this.player.jump()) {
                            this.particleSystem.emit(
                                this.player.x + this.player.width / 2,
                                this.player.y + this.player.height,
                                20,
                                this.player.getParticleColor()
                            );
                        }
                    }

                    if (e.key === 'Escape') {
                        this.running = !this.running;
                    }
                });

                document.addEventListener('keyup', (e) => {
                    this.keys[e.key] = false;
                    this.keys[e.key.toLowerCase()] = false;
                });
            }

            update() {
                if (!this.running) return;

                this.time++;

                // 先更新平台（在玩家之前）
                this.platforms.forEach(p => p.update(this.time));

                // 更新玩家
                const landed = this.player.update(this.keys, this.platforms);
                if (landed) {
                    this.particleSystem.emit(
                        this.player.x + this.player.width / 2,
                        this.player.y + this.player.height,
                        15,
                        this.player.getParticleColor()
                    );
                    this.camera.addShake(3);
                }

                // 更新收集物
                this.collectibles.forEach(c => {
                    c.update(
                        this.time,
                        this.player.x + this.player.width / 2,
                        this.player.y + this.player.height / 2
                    );

                    // 检测碰撞
                    if (c.checkCollision(this.player.x, this.player.y, this.player.width, this.player.height)) {
                        c.collected = true; // 标记为已收集！
                        const points = c.type === 'bow' ? 150 : 100;
                        this.addScore(points);
                        this.addCombo();

                        // 根据主题确定粒子颜色
                        let particleColor = '#ff9ece'; // 默认粉色
                        if (c.theme === 'chocolate') {
                            particleColor = c.type === 'bow' ? '#d2a679' : '#6d4c41'; // 榛子褐色 / 巧克力棕色
                        } else if (c.theme === 'matcha') {
                            particleColor = c.type === 'bow' ? '#8cc074' : '#7bcd32'; // 抹茶饼干绿 / 茶叶绿
                        } else if (c.theme === 'strawberry') {
                            particleColor = c.type === 'bow' ? '#ffcc80' : '#ff8fa3'; // 华夫饼金黄 / 草莓Pocky粉
                        } else if (c.theme === 'sky') {
                            particleColor = c.type === 'bow' ? '#ffffff' : '#fffef7'; // 棉花糖白 / 白巧克力
                        } else if (c.theme === 'jewelry') {
                            particleColor = c.type === 'bow' ? '#f0e6ff' : '#ffd700'; // 珍珠浅紫白 / 金币金
                        } else if (c.theme === 'beverage') {
                            particleColor = c.type === 'bow' ? '#333333' : '#dc143c'; // 酒瓶灰黑 / 车厘子红
                        } else if (c.theme === 'makeup') {
                            particleColor = c.type === 'bow' ? '#e0e0e0' : '#f0f0ff'; // 化妆刷银灰 / 镜子银白
                        } else {
                            particleColor = c.type === 'bow' ? '#ff9ece' : '#c8a2d8'; // 蝴蝶结粉 / 糖果紫
                        }

                        this.particleSystem.emit(c.x, c.y, 30, particleColor);
                        this.camera.addShake(2);
                    }
                });

                // 更新危险物
                this.hazards.forEach(h => {
                    h.update(this.time);
                    if (h.checkCollision(this.player.x, this.player.y, this.player.width, this.player.height)) {
                        this.gameOver();
                    }
                });

                // 更新检查点
                this.checkpoints.forEach(cp => {
                    cp.update(this.time);
                    if (cp.checkActivation(this.player.x, this.player.y, this.player.width, this.player.height)) {
                        this.currentCheckpoint = cp;
                        // 播放激活音效（TODO: 添加音效）
                        this.particleSystem.emit(cp.x, cp.y - 30, 50, '#ffd700');
                        this.camera.addShake(2);
                    }
                });

                // 更新粒子
                this.particleSystem.update();

                // 更新背景
                this.background.update();

                // 更新相机
                this.camera.update(this.player.x, this.player.y, this.canvas.width);

                // 更新combo计时器
                if (this.combo > 0) {
                    this.comboTimer++;
                    if (this.comboTimer > this.comboMaxTime) {
                        this.resetCombo();
                    }
                }

                // 更新进度条
                const progress = Math.min(100, (this.player.x / CONFIG.finishLine) * 100);
                document.getElementById('progressFill').style.width = progress + '%';

                // 检查掉落
                if (this.player.y > this.canvas.height + 100) {
                    this.gameOver();
                }

                // 检查终点
                if (this.player.x > CONFIG.finishLine) {
                    this.addScore(1000);
                    this.gameOver();
                }
            }

            draw() {
                // 绘制背景
                this.background.draw(this.ctx, this.camera.x, this.player.x);

                // 绘制平台
                this.platforms.forEach(p => p.draw(this.ctx, this.camera.x, this.time));

                // 绘制检查点（在平台之后，玩家之前）
                this.checkpoints.forEach(cp => cp.draw(this.ctx, this.camera.x));

                // 绘制收集物
                this.collectibles.forEach(c => c.draw(this.ctx, this.camera.x));

                // 绘制危险物
                this.hazards.forEach(h => h.draw(this.ctx, this.camera.x));

                // 绘制玩家
                this.player.draw(this.ctx, this.camera.x, this.time);

                // 绘制粒子
                this.particleSystem.draw(this.ctx, this.camera.x);
            }

            addScore(points) {
                const comboMultiplier = Math.min(1 + this.combo * 0.1, 3);
                this.score += Math.floor(points * comboMultiplier);
                document.getElementById('scoreValue').textContent = this.score;
            }

            addCombo() {
                this.combo++;
                this.comboTimer = 0;
                document.getElementById('comboValue').textContent = this.combo;
                document.getElementById('combo').classList.add('show');
            }

            resetCombo() {
                this.combo = 0;
                this.comboTimer = 0;
                document.getElementById('combo').classList.remove('show');
            }

            gameOver() {
                this.running = false;
                document.getElementById('finalScore').textContent = this.score;

                // 更新检查点信息
                const checkpointInfo = document.getElementById('checkpointInfo');
                const continueBtn = document.getElementById('continueBtn');

                if (this.currentCheckpoint) {
                    checkpointInfo.textContent = `检查点: ${this.currentCheckpoint.name}`;
                    continueBtn.disabled = false;
                } else {
                    checkpointInfo.textContent = '未激活检查点';
                    continueBtn.disabled = true;
                }

                document.getElementById('gameOver').classList.add('show');
            }

            continueFromCheckpoint() {
                if (!this.currentCheckpoint) return;

                this.running = true;
                document.getElementById('gameOver').classList.remove('show');

                // 从检查点重生
                this.player.x = this.currentCheckpoint.x + 50;
                this.player.y = this.currentCheckpoint.y - 100;
                this.player.velX = 0;
                this.player.velY = 0;
                this.player.jumping = false;
                this.player.grounded = false;

                // 重置combo但保留分数
                this.combo = 0;
                this.comboTimer = 0;
                document.getElementById('combo').classList.remove('show');

                // 清空粒子
                this.particleSystem = new ParticleSystem();

                // 重置相机
                this.camera.x = this.player.x - this.canvas.width / 3;
                this.camera.shake = 0;
            }

            restart() {
                this.running = true;
                this.score = 0;
                this.combo = 0;
                this.comboTimer = 0;
                this.time = 0;

                this.player = new Player(100, 500);
                this.camera = new Camera();
                this.particleSystem = new ParticleSystem();

                this.platforms = CONFIG.platforms.map(p => new Platform(p));
                this.collectibles = [
                    ...CONFIG.collectibles.bows.map(b => new Collectible(b.x, b.y, 'bow', b.theme)),
                    ...CONFIG.collectibles.candies.map(c => new Collectible(c.x, c.y, 'candy', c.theme))
                ];
                this.hazards = CONFIG.hazards.map(h => new Hazard(h.x, h.y, h.type));
                this.checkpoints = CONFIG.checkpoints.map(cp => new Checkpoint(cp.x, cp.y, cp.name, cp.scene));
                this.currentCheckpoint = null;

                document.getElementById('scoreValue').textContent = '0';
                document.getElementById('gameOver').classList.remove('show');
                document.getElementById('combo').classList.remove('show');
                document.getElementById('progressFill').style.width = '0%';
            }

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }

        // 启动游戏
        const game = new Game();
    </script>
</body>
