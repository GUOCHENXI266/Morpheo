<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>Morpheo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(180deg, #ffd1dc 0%, #ffb3d9 50%, #c8a2d8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #gameContainer {
            position: relative;
            width: 1000px;
            height: 700px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 10;
        }

        #score {
            position: absolute;
            top: 30px;
            left: 40px;
            color: white;
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 2px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
        }

        #scoreValue {
            display: block;
            font-size: 48px;
            font-weight: 600;
            margin-top: 5px;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #combo {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #ffd700;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 2px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity 0.3s;
        }

        #combo.show {
            opacity: 1;
        }

        #controls {
            position: absolute;
            bottom: 30px;
            left: 40px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            letter-spacing: 1px;
            line-height: 1.8;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.2);
        }

        #progressBar {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            overflow: hidden;
        }

        #progressFill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff6b9d, #ffd700, #ff6b9d);
            background-size: 200% 100%;
            animation: shimmer 2s linear infinite;
            transition: width 0.3s;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        #gameOver {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 182, 193, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: all;
        }

        #gameOver.show {
            display: flex;
        }

        .game-over-content {
            text-align: center;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .game-over-title {
            font-size: 64px;
            font-weight: 600;
            color: white;
            margin-bottom: 20px;
            letter-spacing: 4px;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.3);
        }

        .game-over-score {
            font-size: 24px;
            color: white;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.2);
        }

        .checkpoint-info {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .restart-btn, .continue-btn {
            padding: 18px 50px;
            font-size: 18px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            letter-spacing: 2px;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .restart-btn {
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            box-shadow: 0 8px 20px rgba(255, 107, 157, 0.4);
        }

        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255, 107, 157, 0.6);
        }

        .continue-btn {
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.4);
        }

        .continue-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(76, 175, 80, 0.6);
        }

        .continue-btn:disabled {
            background: linear-gradient(135deg, #9e9e9e 0%, #757575 100%);
            cursor: not-allowed;
            opacity: 0.5;
        }

        .continue-btn:disabled:hover {
            transform: none;
            box-shadow: 0 8px 20px rgba(158, 158, 158, 0.4);
        }
    </style>

        // ==================== 工具函数 ====================
        class Utils {
            static hexToRgb(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : { r: 0, g: 0, b: 0 };
            }

            static lerpColor(color1, color2, ratio) {
                const c1 = this.hexToRgb(color1);
                const c2 = this.hexToRgb(color2);
                const r = Math.round(c1.r + (c2.r - c1.r) * ratio);
                const g = Math.round(c1.g + (c2.g - c1.g) * ratio);
                const b = Math.round(c1.b + (c2.b - c1.b) * ratio);
                return `rgb(${r}, ${g}, ${b})`;
            }

            static lerp(a, b, t) {
                return a + (b - a) * t;
            }
        }

        // ==================== 粒子系统 ====================
        class Particle {
            constructor(x, y, color, velX, velY) {
                this.x = x;
                this.y = y;
                this.velX = velX || (Math.random() - 0.5) * 6;
                this.velY = velY || (Math.random() - 0.5) * 6 - 2;
                this.size = Math.random() * 4 + 2;
                this.color = color;
                this.life = 1;
                this.decay = 0.02;
            }

            update() {
                this.x += this.velX;
                this.y += this.velY;
                this.velX *= 0.95;
                this.velY += 0.2;
                this.life -= this.decay;
                return this.life > 0;
            }

            draw(ctx, cameraX) {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x - cameraX, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        class ParticleSystem {
            constructor() {
                this.particles = [];
                this.maxParticles = 200;
            }

            emit(x, y, count, color) {
                if (this.particles.length >= this.maxParticles) return;
                for (let i = 0; i < count && this.particles.length < this.maxParticles; i++) {
                    this.particles.push(new Particle(x, y, color));
                }
            }

            update() {
                this.particles = this.particles.filter(p => p.update());
            }

            draw(ctx, cameraX) {
                this.particles.forEach(p => p.draw(ctx, cameraX));
            }
        }

        // ==================== 平台类 ====================
        class Platform {
            constructor(config) {
                this.x = config.x;
                this.y = config.y;
                this.width = config.width;
                this.height = config.height;
                this.type = config.type;
                this.moving = config.moving || null;

                // 记录上一帧位置
                this.lastX = this.x;
                this.lastY = this.y;

                if (this.moving) {
                    this.initialX = this.x;
                    this.initialY = this.y;
                    this.moveOffset = 0;
                }
            }

            update(time) {
                // 保存当前位置
                this.lastX = this.x;
                this.lastY = this.y;

                if (this.moving) {
                    this.moveOffset += this.moving.speed * 0.02;
                    const offset = Math.sin(this.moveOffset) * this.moving.range;

                    if (this.moving.axis === 'x') {
                        this.x = this.initialX + offset;
                    } else {
                        this.y = this.initialY + offset;
                    }
                }
            }

            draw(ctx, cameraX, time) {
                const screenX = this.x - cameraX;
                if (screenX + this.width < -50 || screenX > ctx.canvas.width + 50) return;

                ctx.save();

                // 阴影
                ctx.fillStyle = 'rgba(100, 80, 80, 0.25)';
                ctx.beginPath();
                ctx.ellipse(
                    screenX + this.width / 2,
                    this.y + this.height + 8,
                    this.width / 2,
                    12,
                    0, 0, Math.PI * 2
                );
                ctx.fill();

                // 根据类型绘制
                this.drawPlatformByType(ctx, screenX, time);

                ctx.restore();
            }

            drawPlatformByType(ctx, screenX, time) {
                const colors = {
                    cream: { main: '#fffef7', light: '#fef9e7', dark: '#fef5d4' },
                    chocolate: { main: '#5d4037', light: '#6d4c41', dark: '#3e2723' },
                    matcha: { main: '#7bcd32', light: '#9cd95a', dark: '#5fa826' },
                    strawberry: { main: '#ff8fa3', light: '#ffb3c1', dark: '#ff6b8a' },
                    sky: { main: '#90caf9', light: '#bbdefb', dark: '#64b5f6' },
                    jewelry: { main: '#ba68c8', light: '#ce93d8', dark: '#9c27b0' },
                    beverage: { main: '#b71c1c', light: '#c62828', dark: '#8b0000' },
                    makeup: { main: '#c0c0c0', light: '#e0e0e0', dark: '#a0a0a0' }
                };

                const color = colors[this.type] || colors.cream;

                // 平台主体
                const gradient = ctx.createLinearGradient(
                    screenX, this.y,
                    screenX, this.y + this.height * 0.6
                );
                gradient.addColorStop(0, color.light);
                gradient.addColorStop(0.5, color.main);
                gradient.addColorStop(1, color.dark);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.moveTo(screenX, this.y + this.height * 0.3);
                ctx.lineTo(screenX, this.y + this.height);
                ctx.lineTo(screenX + this.width, this.y + this.height);
                ctx.lineTo(screenX + this.width, this.y + this.height * 0.3);

                // 波浪顶部
                const waveCount = Math.floor(this.width / 40);
                for (let i = 0; i <= waveCount; i++) {
                    const x = screenX + this.width - (i * this.width / waveCount);
                    const y = this.y + this.height * 0.2 + Math.sin(i * 0.5 + time * 0.05) * 3;
                    if (i === 0) {
                        ctx.lineTo(x, y);
                    } else {
                        const prevX = screenX + this.width - ((i - 1) * this.width / waveCount);
                        const prevY = this.y + this.height * 0.2 + Math.sin((i - 1) * 0.5 + time * 0.05) * 3;
                        const cpX = (x + prevX) / 2;
                        const cpY = (y + prevY) / 2 - 5;
                        ctx.quadraticCurveTo(cpX, cpY, x, y);
                    }
                }
                ctx.closePath();
                ctx.fill();

                // 高光
                const highlightGradient = ctx.createLinearGradient(
                    screenX, this.y,
                    screenX, this.y + this.height * 0.4
                );
                // makeup平台的镜面高光更强
                if (this.type === 'makeup') {
                    highlightGradient.addColorStop(0, 'rgba(255, 255, 255, 0.7)');
                    highlightGradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.4)');
                    highlightGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                } else {
                    highlightGradient.addColorStop(0, 'rgba(255, 255, 255, 0.4)');
                    highlightGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                }

                ctx.fillStyle = highlightGradient;
                ctx.beginPath();
                ctx.moveTo(screenX, this.y + this.height * 0.3);
                for (let i = 0; i <= waveCount; i++) {
                    const x = screenX + (i * this.width / waveCount);
                    const y = this.y + this.height * 0.2 + Math.sin(i * 0.5 + time * 0.05) * 3;
                    if (i === 0) {
                        ctx.lineTo(x, y);
                    } else {
                        const prevX = screenX + ((i - 1) * this.width / waveCount);
                        const prevY = this.y + this.height * 0.2 + Math.sin((i - 1) * 0.5 + time * 0.05) * 3;
                        const cpX = (x + prevX) / 2;
                        const cpY = (y + prevY) / 2 - 5;
                        ctx.quadraticCurveTo(cpX, cpY, x, y);
                    }
                }
                ctx.lineTo(screenX + this.width, this.y + this.height * 0.3);
                ctx.closePath();
                ctx.fill();

                // makeup平台的额外镜面反射效果
                if (this.type === 'makeup') {
                    // 斜向镜面高光
                    const mirrorGradient = ctx.createLinearGradient(
                        screenX + this.width * 0.2, this.y,
                        screenX + this.width * 0.8, this.y + this.height * 0.5
                    );
                    mirrorGradient.addColorStop(0, 'rgba(255, 255, 255, 0)');
                    mirrorGradient.addColorStop(0.4, 'rgba(255, 255, 255, 0.5)');
                    mirrorGradient.addColorStop(0.6, 'rgba(255, 255, 255, 0.5)');
                    mirrorGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

                    ctx.fillStyle = mirrorGradient;
                    ctx.fillRect(screenX, this.y, this.width, this.height * 0.6);

                    // 闪烁星星效果
                    ctx.fillStyle = `rgba(255, 255, 255, ${0.5 + Math.sin(time * 0.1) * 0.3})`;
                    const starCount = Math.floor(this.width / 80);
                    for (let i = 0; i < starCount; i++) {
                        const starX = screenX + (i + 0.5) * (this.width / starCount);
                        const starY = this.y + this.height * 0.15;
                        ctx.font = 'bold 12px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('✦', starX, starY);
                    }
                }
            }
        }

        // ==================== 收集物类 ====================
        class Collectible {
            constructor(x, y, type, theme) {
                this.x = x;
                this.y = y;
                this.type = type; // 'bow' or 'candy'
                this.theme = theme;
                this.collected = false;
                this.float = 0;
                this.rotation = 0;
                this.magnetRange = 80;
                this.magnetStrength = 0.3;
            }

            update(time, playerX, playerY) {
                if (this.collected) return;

                this.float += 0.05;
                this.rotation += 0.02;

                // 磁铁效果
                const dx = playerX - this.x;
                const dy = playerY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < this.magnetRange) {
                    const pullRatio = (this.magnetRange - dist) / this.magnetRange;
                    this.x += dx * this.magnetStrength * pullRatio;
                    this.y += dy * this.magnetStrength * pullRatio;
                }
            }

            draw(ctx, cameraX) {
                if (this.collected) return;

                const screenX = this.x - cameraX;
                if (screenX < -50 || screenX > ctx.canvas.width + 50) return;

                const floatY = this.y + Math.sin(this.float) * 8;

                ctx.save();
                ctx.translate(screenX, floatY);
                ctx.rotate(this.rotation);

                // 根据主题和类型绘制不同物品
                if (this.theme === 'chocolate') {
                    if (this.type === 'bow') {
                        this.drawHazelnut(ctx); // 榛子
                    } else {
                        this.drawChocolateBar(ctx); // 巧克力块
                    }
                } else if (this.theme === 'matcha') {
                    if (this.type === 'bow') {
                        this.drawMatchaCookie(ctx); // 抹茶饼干
                    } else {
                        this.drawTeaLeaf(ctx); // 茶叶
                    }
                } else if (this.theme === 'strawberry') {
                    if (this.type === 'bow') {
                        this.drawWaffle(ctx); // 华夫饼
                    } else {
                        this.drawStrawberryPocky(ctx); // 草莓Pocky
                    }
                } else if (this.theme === 'sky') {
                    if (this.type === 'bow') {
                        this.drawMarshmallow(ctx); // 棉花糖
                    } else {
                        this.drawWhiteChocolate(ctx); // 白巧克力
                    }
                } else if (this.theme === 'jewelry') {
                    if (this.type === 'bow') {
                        this.drawPearlNecklace(ctx); // 珍珠项链
                    } else {
                        this.drawGoldCoin(ctx); // 金币
                    }
                } else if (this.theme === 'beverage') {
                    if (this.type === 'bow') {
                        this.drawWineBottle(ctx); // 红酒瓶
                    } else {
                        this.drawCherry(ctx); // 车厘子
                    }
                } else if (this.theme === 'makeup') {
                    if (this.type === 'bow') {
                        this.drawMakeupBrush(ctx); // 化妆刷
                    } else {
                        this.drawMirror(ctx); // 镜子
                    }
                } else {
                    // 奶油场景保持原样
                    if (this.type === 'bow') {
                        this.drawBow(ctx);
                    } else {
                        this.drawCandy(ctx);
                    }
                }

                ctx.restore();
            }

            drawBow(ctx) {
                // 发光
                const glowGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 30);
                glowGradient.addColorStop(0, 'rgba(255, 182, 193, 0.4)');
                glowGradient.addColorStop(1, 'rgba(255, 182, 193, 0)');
                ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 30, 0, Math.PI * 2);
                ctx.fill();

                // 蝴蝶结
                const leftGradient = ctx.createLinearGradient(-15, -10, -15, 10);
                leftGradient.addColorStop(0, '#ff9ece');
                leftGradient.addColorStop(0.5, '#ffb6d9');
                leftGradient.addColorStop(1, '#ff9ece');
                ctx.fillStyle = leftGradient;
                ctx.beginPath();
                ctx.ellipse(-10, 0, 12, 15, Math.PI * 0.1, 0, Math.PI * 2);
                ctx.fill();

                const rightGradient = ctx.createLinearGradient(15, -10, 15, 10);
                rightGradient.addColorStop(0, '#ff9ece');
                rightGradient.addColorStop(0.5, '#ffb6d9');
                rightGradient.addColorStop(1, '#ff9ece');
                ctx.fillStyle = rightGradient;
                ctx.beginPath();
                ctx.ellipse(10, 0, 12, 15, -Math.PI * 0.1, 0, Math.PI * 2);
                ctx.fill();

                // 中心结
                ctx.fillStyle = '#ff6b9d';
                ctx.beginPath();
                ctx.arc(0, 0, 6, 0, Math.PI * 2);
                ctx.fill();

                // 高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.beginPath();
                ctx.arc(-8, -3, 3, 0, Math.PI * 2);
                ctx.arc(8, -3, 3, 0, Math.PI * 2);
                ctx.fill();
            }

            drawCandy(ctx) {
                // 发光
                const glowGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 25);
                glowGradient.addColorStop(0, 'rgba(167, 139, 250, 0.4)');
                glowGradient.addColorStop(1, 'rgba(167, 139, 250, 0)');
                ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 25, 0, Math.PI * 2);
                ctx.fill();

                // 糖果主体
                const candyGradient = ctx.createLinearGradient(-12, -12, 12, 12);
                candyGradient.addColorStop(0, '#c8a2d8');
                candyGradient.addColorStop(0.5, '#a17ab8');
                candyGradient.addColorStop(1, '#c8a2d8');
                ctx.fillStyle = candyGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 10, 0, Math.PI * 2);
                ctx.fill();

                // 高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(-4, -4, 4, 0, Math.PI * 2);
                ctx.fill();
            }

            drawHazelnut(ctx) {
                // 榛子发光
                const glowGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 30);
                glowGradient.addColorStop(0, 'rgba(139, 69, 19, 0.3)');
                glowGradient.addColorStop(1, 'rgba(139, 69, 19, 0)');
                ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 30, 0, Math.PI * 2);
                ctx.fill();

                // 榛子壳（椭圆形）
                const shellGradient = ctx.createRadialGradient(-3, -3, 0, 0, 0, 15);
                shellGradient.addColorStop(0, '#d2a679');
                shellGradient.addColorStop(0.5, '#b8956a');
                shellGradient.addColorStop(1, '#8b6f47');
                ctx.fillStyle = shellGradient;
                ctx.beginPath();
                ctx.ellipse(0, 0, 12, 14, 0, 0, Math.PI * 2);
                ctx.fill();

                // 榛子纹理（竖线）
                ctx.strokeStyle = 'rgba(101, 67, 33, 0.4)';
                ctx.lineWidth = 1;
                for (let i = -8; i <= 8; i += 3) {
                    ctx.beginPath();
                    ctx.moveTo(i, -10);
                    ctx.lineTo(i, 10);
                    ctx.stroke();
                }

                // 顶部尖端
                const tipGradient = ctx.createRadialGradient(0, -12, 0, 0, -14, 4);
                tipGradient.addColorStop(0, '#8b6f47');
                tipGradient.addColorStop(1, '#654321');
                ctx.fillStyle = tipGradient;
                ctx.beginPath();
                ctx.moveTo(0, -14);
                ctx.lineTo(-3, -10);
                ctx.lineTo(3, -10);
                ctx.closePath();
                ctx.fill();

                // 高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.beginPath();
                ctx.ellipse(-4, -5, 4, 6, -0.3, 0, Math.PI * 2);
                ctx.fill();
            }

            drawChocolateBar(ctx) {
                // 巧克力块发光
                const glowGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 30);
                glowGradient.addColorStop(0, 'rgba(109, 76, 65, 0.3)');
                glowGradient.addColorStop(1, 'rgba(109, 76, 65, 0)');
                ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 30, 0, Math.PI * 2);
                ctx.fill();

                // 巧克力块主体
                const chocoGradient = ctx.createLinearGradient(-12, -12, 12, 12);
                chocoGradient.addColorStop(0, '#5d4037');
                chocoGradient.addColorStop(0.3, '#6d4c41');
                chocoGradient.addColorStop(0.6, '#5d4037');
                chocoGradient.addColorStop(1, '#4e342e');
                ctx.fillStyle = chocoGradient;
                ctx.fillRect(-12, -12, 24, 24);

                // 分块纹理（2x2格子）
                ctx.strokeStyle = 'rgba(62, 39, 35, 0.6)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, -12);
                ctx.lineTo(0, 12);
                ctx.moveTo(-12, 0);
                ctx.lineTo(12, 0);
                ctx.stroke();

                // 每个格子的高光
                ctx.fillStyle = 'rgba(160, 120, 90, 0.3)';
                for (let row = 0; row < 2; row++) {
                    for (let col = 0; col < 2; col++) {
                        const x = -10 + col * 12;
                        const y = -10 + row * 12;
                        ctx.beginPath();
                        ctx.fillRect(x, y, 8, 8);
                    }
                }

                // 整体高光
                const highlightGradient = ctx.createRadialGradient(-6, -6, 0, -4, -4, 12);
                highlightGradient.addColorStop(0, 'rgba(200, 160, 120, 0.5)');
                highlightGradient.addColorStop(1, 'rgba(200, 160, 120, 0)');
                ctx.fillStyle = highlightGradient;
                ctx.fillRect(-12, -12, 24, 24);
            }

            drawMatchaCookie(ctx) {
                // 抹茶饼干发光
                const glowGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 30);
                glowGradient.addColorStop(0, 'rgba(123, 205, 50, 0.3)');
                glowGradient.addColorStop(1, 'rgba(123, 205, 50, 0)');
                ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 30, 0, Math.PI * 2);
                ctx.fill();

                // 饼干主体
                const cookieGradient = ctx.createRadialGradient(-3, -3, 0, 0, 0, 14);
                cookieGradient.addColorStop(0, '#a8d58a');
                cookieGradient.addColorStop(0.5, '#8cc074');
                cookieGradient.addColorStop(1, '#6fa854');
                ctx.fillStyle = cookieGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 14, 0, Math.PI * 2);
                ctx.fill();

                // 饼干边缘（锯齿状）
                ctx.strokeStyle = '#5fa826';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                for (let i = 0; i < 12; i++) {
                    const angle = (i / 12) * Math.PI * 2;
                    const r = 14 + (i % 2 === 0 ? 1 : -1);
                    const x = Math.cos(angle) * r;
                    const y = Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();

                // 抹茶粉纹理（小圆点）
                ctx.fillStyle = 'rgba(95, 168, 38, 0.5)';
                for (let i = 0; i < 8; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const r = Math.random() * 8;
                    const x = Math.cos(angle) * r;
                    const y = Math.sin(angle) * r;
                    ctx.beginPath();
                    ctx.arc(x, y, 1, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.beginPath();
                ctx.arc(-5, -5, 4, 0, Math.PI * 2);
                ctx.fill();
            }

            drawTeaLeaf(ctx) {
                // 茶叶发光
                const glowGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 25);
                glowGradient.addColorStop(0, 'rgba(107, 142, 35, 0.4)');
                glowGradient.addColorStop(1, 'rgba(107, 142, 35, 0)');
                ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 25, 0, Math.PI * 2);
                ctx.fill();

                // 茶叶主体（椭圆叶片）
                const leafGradient = ctx.createLinearGradient(-8, -12, 8, 12);
                leafGradient.addColorStop(0, '#8cc074');
                leafGradient.addColorStop(0.3, '#7bcd32');
                leafGradient.addColorStop(0.6, '#6fa854');
                leafGradient.addColorStop(1, '#5fa826');
                ctx.fillStyle = leafGradient;
                ctx.beginPath();
                ctx.ellipse(0, 0, 8, 14, 0.2, 0, Math.PI * 2);
                ctx.fill();

                // 叶脉（中间主脉）
                ctx.strokeStyle = 'rgba(95, 168, 38, 0.6)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(0, -12);
                ctx.lineTo(0, 12);
                ctx.stroke();

                // 叶脉（侧脉）
                ctx.lineWidth = 1;
                for (let i = -8; i <= 8; i += 4) {
                    if (i === 0) continue;
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(6, i + 2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(-6, i + 2);
                    ctx.stroke();
                }

                // 叶尖
                ctx.fillStyle = '#5fa826';
                ctx.beginPath();
                ctx.moveTo(0, -14);
                ctx.lineTo(-3, -10);
                ctx.lineTo(3, -10);
                ctx.closePath();
                ctx.fill();

                // 高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.ellipse(-3, -6, 3, 5, 0.2, 0, Math.PI * 2);
                ctx.fill();
            }

            drawWaffle(ctx) {
                // 华夫饼发光
                const glowGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 30);
                glowGradient.addColorStop(0, 'rgba(255, 193, 37, 0.3)');
                glowGradient.addColorStop(1, 'rgba(255, 193, 37, 0)');
                ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 30, 0, Math.PI * 2);
                ctx.fill();

                // 华夫饼主体
                const waffleGradient = ctx.createRadialGradient(-3, -3, 0, 0, 0, 15);
                waffleGradient.addColorStop(0, '#ffcc80');
                waffleGradient.addColorStop(0.5, '#ffb74d');
                waffleGradient.addColorStop(1, '#ff9800');
                ctx.fillStyle = waffleGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 15, 0, Math.PI * 2);
                ctx.fill();

                // 格子纹理
                ctx.strokeStyle = 'rgba(230, 140, 0, 0.5)';
                ctx.lineWidth = 1.5;
