<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morpheo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(180deg, #ffd1dc 0%, #ffb3d9 50%, #c8a2d8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #gameContainer {
            position: relative;
            width: 1000px;
            height: 700px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 10;
        }

        #score {
            position: absolute;
            top: 30px;
            left: 40px;
            color: white;
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 2px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
        }

        #scoreValue {
            display: block;
            font-size: 48px;
            font-weight: 600;
            margin-top: 5px;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #combo {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #ffd700;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 2px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity 0.3s;
        }

        #combo.show {
            opacity: 1;
        }

        #controls {
            position: absolute;
            bottom: 30px;
            left: 40px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            letter-spacing: 1px;
            line-height: 1.8;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.2);
        }

        #progressBar {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            overflow: hidden;
        }

        #progressFill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff6b9d, #ffd700, #ff6b9d);
            background-size: 200% 100%;
            animation: shimmer 2s linear infinite;
            transition: width 0.3s;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        #gameOver {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 182, 193, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: all;
        }

        #gameOver.show {
            display: flex;
        }

        .game-over-content {
            text-align: center;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .game-over-title {
            font-size: 64px;
            font-weight: 600;
            color: white;
            margin-bottom: 20px;
            letter-spacing: 4px;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.3);
        }

        .game-over-score {
            font-size: 24px;
            color: white;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.2);
        }

        .restart-btn {
            padding: 18px 60px;
            font-size: 18px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 107, 157, 0.4);
        }

        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255, 107, 157, 0.6);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1000" height="700"></canvas>
        <div id="ui">
            <div id="progressBar">
                <div id="progressFill"></div>
            </div>
            <div id="score">
                SCORE
                <span id="scoreValue">0</span>
            </div>
            <div id="combo">COMBO x<span id="comboValue">0</span></div>
            <div id="controls">
                ← → / A D · 移动<br>
                ↑ / W / 空格 · 跳跃<br>
                ESC · 暂停
            </div>
        </div>
        <div id="gameOver">
            <div class="game-over-content">
                <div class="game-over-title">✨ Dream End ✨</div>
                <div class="game-over-score">最终分数: <span id="finalScore">0</span></div>
                <button class="restart-btn" onclick="game.restart()">再玩一次</button>
            </div>
        </div>
    </div>

    <script>

                { x: 1320, y: 450, width: 200, height: 50, type: 'cream' },

                { x: 1780, y: 280, width: 220, height: 50, type: 'cream' },

            ],

            // 收集物配置
            collectibles: {
                bows: [
                    { x: 450, y: 480, theme: 'cream' },
                    { x: 700, y: 380, theme: 'cream' },
                    { x: 1200, y: 230, theme: 'cream' },
                    { x: 1670, y: 280, theme: 'cream' },
                    { x: 2150, y: 130, theme: 'cream' },
                    { x: 2600, y: 180, theme: 'cream' },
                    { x: 3150, y: 380, theme: 'chocolate' },
                    { x: 3660, y: 210, theme: 'chocolate' },
                    { x: 4140, y: 230, theme: 'chocolate' },
                    { x: 4640, y: 280, theme: 'chocolate' },
                    { x: 5160, y: 110, theme: 'chocolate' },
                    { x: 5950, y: 330, theme: 'matcha' },
                    { x: 6450, y: 380, theme: 'matcha' },

                    { x: 7440, y: 430, theme: 'matcha' }
                ],
                candies: [
                    { x: 500, y: 500, theme: 'cream' },
                    { x: 900, y: 310, theme: 'cream' },
                    { x: 1400, y: 380, theme: 'cream' },
                    { x: 1850, y: 210, theme: 'cream' },
                    { x: 2350, y: 280, theme: 'cream' },
                    { x: 2850, y: 430, theme: 'cream' },
                    { x: 3420, y: 280, theme: 'chocolate' },
                    { x: 3910, y: 330, theme: 'chocolate' },
                    { x: 4400, y: 380, theme: 'chocolate' },
                    { x: 4890, y: 180, theme: 'chocolate' },
                    { x: 5390, y: 250, theme: 'chocolate' },
                    { x: 6000, y: 330, theme: 'matcha' },
                    { x: 6500, y: 280, theme: 'matcha' },
                    { x: 7000, y: 330, theme: 'matcha' }
                ]
            },

            // 危险物配置
            hazards: [
                { x: 3700, y: 200, type: 'spike' },
                { x: 4200, y: 220, type: 'spike' },
                { x: 4800, y: 150, type: 'spike' },
                { x: 6200, y: 220, type: 'spike' },
                { x: 6700, y: 170, type: 'spike' }
            ],

            // 终点
            finishLine: 7800
        };

        // ==================== 工具函数 ====================
        class Utils {
            static hexToRgb(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : { r: 0, g: 0, b: 0 };
            }

            static lerpColor(color1, color2, ratio) {
                const c1 = this.hexToRgb(color1);
                const c2 = this.hexToRgb(color2);
                const r = Math.round(c1.r + (c2.r - c1.r) * ratio);
                const g = Math.round(c1.g + (c2.g - c1.g) * ratio);
                const b = Math.round(c1.b + (c2.b - c1.b) * ratio);
                return `rgb(${r}, ${g}, ${b})`;
            }

            static lerp(a, b, t) {
                return a + (b - a) * t;
            }
        }

        // ==================== 粒子系统 ====================
        class Particle {
            constructor(x, y, color, velX, velY) {
                this.x = x;
                this.y = y;
                this.velX = velX || (Math.random() - 0.5) * 6;
                this.velY = velY || (Math.random() - 0.5) * 6 - 2;
                this.size = Math.random() * 4 + 2;
                this.color = color;
                this.life = 1;
                this.decay = 0.02;
            }

            update() {
                this.x += this.velX;
                this.y += this.velY;
                this.velX *= 0.95;
                this.velY += 0.2;
                this.life -= this.decay;
                return this.life > 0;
            }

            draw(ctx, cameraX) {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x - cameraX, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        class ParticleSystem {
            constructor() {
                this.particles = [];
                this.maxParticles = 200;
            }

            emit(x, y, count, color) {
                if (this.particles.length >= this.maxParticles) return;
                for (let i = 0; i < count && this.particles.length < this.maxParticles; i++) {
                    this.particles.push(new Particle(x, y, color));
                }
            }

            update() {
                this.particles = this.particles.filter(p => p.update());
            }

            draw(ctx, cameraX) {
                this.particles.forEach(p => p.draw(ctx, cameraX));
            }
        }

        // ==================== 平台类 ====================
        class Platform {
            constructor(config) {
                this.x = config.x;
                this.y = config.y;
                this.width = config.width;
                this.height = config.height;
                this.type = config.type;
                this.moving = config.moving || null;

                // 记录上一帧位置
                this.lastX = this.x;
                this.lastY = this.y;

                if (this.moving) {
                    this.initialX = this.x;
                    this.initialY = this.y;
                    this.moveOffset = 0;
                }
            }

            update(time) {
                // 保存当前位置
                this.lastX = this.x;
                this.lastY = this.y;

                if (this.moving) {
                    this.moveOffset += this.moving.speed * 0.02;
                    const offset = Math.sin(this.moveOffset) * this.moving.range;

                    if (this.moving.axis === 'x') {
                        this.x = this.initialX + offset;
                    } else {
                        this.y = this.initialY + offset;
                    }
                }
            }

            draw(ctx, cameraX, time) {
                const screenX = this.x - cameraX;
                if (screenX + this.width < -50 || screenX > ctx.canvas.width + 50) return;

                ctx.save();

                // 阴影
                ctx.fillStyle = 'rgba(100, 80, 80, 0.25)';
                ctx.beginPath();
                ctx.ellipse(
                    screenX + this.width / 2,
                    this.y + this.height + 8,
                    this.width / 2,
                    12,
                    0, 0, Math.PI * 2
                );
                ctx.fill();

                // 根据类型绘制
                this.drawPlatformByType(ctx, screenX, time);

                ctx.restore();
            }

            drawPlatformByType(ctx, screenX, time) {
                const colors = {
                    cream: { main: '#fffef7', light: '#fef9e7', dark: '#fef5d4' },
                    chocolate: { main: '#5d4037', light: '#6d4c41', dark: '#3e2723' },
                    matcha: { main: '#7bcd32', light: '#9cd95a', dark: '#5fa826' }
                };

                const color = colors[this.type] || colors.cream;

                // 平台主体
                const gradient = ctx.createLinearGradient(
                    screenX, this.y,
                    screenX, this.y + this.height * 0.6
                );
                gradient.addColorStop(0, color.light);
                gradient.addColorStop(0.5, color.main);
                gradient.addColorStop(1, color.dark);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.moveTo(screenX, this.y + this.height * 0.3);
                ctx.lineTo(screenX, this.y + this.height);
                ctx.lineTo(screenX + this.width, this.y + this.height);
                ctx.lineTo(screenX + this.width, this.y + this.height * 0.3);

                // 波浪顶部
                const waveCount = Math.floor(this.width / 40);
                for (let i = 0; i <= waveCount; i++) {
                    const x = screenX + this.width - (i * this.width / waveCount);
                    const y = this.y + this.height * 0.2 + Math.sin(i * 0.5 + time * 0.05) * 3;
                    if (i === 0) {
                        ctx.lineTo(x, y);
                    } else {
                        const prevX = screenX + this.width - ((i - 1) * this.width / waveCount);
                        const prevY = this.y + this.height * 0.2 + Math.sin((i - 1) * 0.5 + time * 0.05) * 3;
                        const cpX = (x + prevX) / 2;
                        const cpY = (y + prevY) / 2 - 5;
                        ctx.quadraticCurveTo(cpX, cpY, x, y);
                    }
                }
                ctx.closePath();
                ctx.fill();

                // 高光
                const highlightGradient = ctx.createLinearGradient(
                    screenX, this.y,
                    screenX, this.y + this.height * 0.4
                );
                highlightGradient.addColorStop(0, 'rgba(255, 255, 255, 0.4)');
                highlightGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

                ctx.fillStyle = highlightGradient;
                ctx.beginPath();
                ctx.moveTo(screenX, this.y + this.height * 0.3);
                for (let i = 0; i <= waveCount; i++) {
                    const x = screenX + (i * this.width / waveCount);
                    const y = this.y + this.height * 0.2 + Math.sin(i * 0.5 + time * 0.05) * 3;
                    if (i === 0) {
                        ctx.lineTo(x, y);
                    } else {
                        const prevX = screenX + ((i - 1) * this.width / waveCount);
                        const prevY = this.y + this.height * 0.2 + Math.sin((i - 1) * 0.5 + time * 0.05) * 3;
                        const cpX = (x + prevX) / 2;
                        const cpY = (y + prevY) / 2 - 5;
                        ctx.quadraticCurveTo(cpX, cpY, x, y);
                    }
                }
                ctx.lineTo(screenX + this.width, this.y + this.height * 0.3);
                ctx.closePath();
                ctx.fill();
            }
        }

        // ==================== 收集物类 ====================
        class Collectible {
            constructor(x, y, type, theme) {
                this.x = x;
                this.y = y;
                this.type = type; // 'bow' or 'candy'
                this.theme = theme;
                this.collected = false;
                this.float = 0;
                this.rotation = 0;
                this.magnetRange = 80;
                this.magnetStrength = 0.3;
            }

            update(time, playerX, playerY) {
                if (this.collected) return;

                this.float += 0.05;
                this.rotation += 0.02;

                // 磁铁效果
                const dx = playerX - this.x;
                const dy = playerY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < this.magnetRange) {
                    const pullRatio = (this.magnetRange - dist) / this.magnetRange;
                    this.x += dx * this.magnetStrength * pullRatio;
                    this.y += dy * this.magnetStrength * pullRatio;
                }
            }

            draw(ctx, cameraX) {
                if (this.collected) return;

                const screenX = this.x - cameraX;
                if (screenX < -50 || screenX > ctx.canvas.width + 50) return;

                const floatY = this.y + Math.sin(this.float) * 8;

                ctx.save();
                ctx.translate(screenX, floatY);
                ctx.rotate(this.rotation);

                // 根据主题和类型绘制不同物品
                if (this.theme === 'chocolate') {
                    if (this.type === 'bow') {
                        this.drawHazelnut(ctx); // 榛子
                    } else {
                        this.drawChocolateBar(ctx); // 巧克力块
                    }
                } else if (this.theme === 'matcha') {
                    if (this.type === 'bow') {
                        this.drawMatchaCookie(ctx); // 抹茶饼干
                    } else {
                        this.drawTeaLeaf(ctx); // 茶叶
                    }
                } else {
                    // 奶油场景保持原样
                    if (this.type === 'bow') {
                        this.drawBow(ctx);
                    } else {
                        this.drawCandy(ctx);
                    }
                }

                ctx.restore();
            }

            drawBow(ctx) {
                // 发光
                const glowGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 30);
                glowGradient.addColorStop(0, 'rgba(255, 182, 193, 0.4)');
                glowGradient.addColorStop(1, 'rgba(255, 182, 193, 0)');
                ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 30, 0, Math.PI * 2);
                ctx.fill();

                // 蝴蝶结
                const leftGradient = ctx.createLinearGradient(-15, -10, -15, 10);
                leftGradient.addColorStop(0, '#ff9ece');
                leftGradient.addColorStop(0.5, '#ffb6d9');
                leftGradient.addColorStop(1, '#ff9ece');
                ctx.fillStyle = leftGradient;
                ctx.beginPath();
                ctx.ellipse(-10, 0, 12, 15, Math.PI * 0.1, 0, Math.PI * 2);
                ctx.fill();

                const rightGradient = ctx.createLinearGradient(15, -10, 15, 10);
                rightGradient.addColorStop(0, '#ff9ece');
                rightGradient.addColorStop(0.5, '#ffb6d9');
                rightGradient.addColorStop(1, '#ff9ece');
                ctx.fillStyle = rightGradient;
                ctx.beginPath();
                ctx.ellipse(10, 0, 12, 15, -Math.PI * 0.1, 0, Math.PI * 2);
                ctx.fill();

                // 中心结
                ctx.fillStyle = '#ff6b9d';
                ctx.beginPath();
                ctx.arc(0, 0, 6, 0, Math.PI * 2);
                ctx.fill();

                // 高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.beginPath();
                ctx.arc(-8, -3, 3, 0, Math.PI * 2);
                ctx.arc(8, -3, 3, 0, Math.PI * 2);
                ctx.fill();
            }

            drawCandy(ctx) {
                // 发光
                const glowGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 25);
                glowGradient.addColorStop(0, 'rgba(167, 139, 250, 0.4)');
                glowGradient.addColorStop(1, 'rgba(167, 139, 250, 0)');
                ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 25, 0, Math.PI * 2);
                ctx.fill();

                // 糖果主体
                const candyGradient = ctx.createLinearGradient(-12, -12, 12, 12);
                candyGradient.addColorStop(0, '#c8a2d8');
                candyGradient.addColorStop(0.5, '#a17ab8');
                candyGradient.addColorStop(1, '#c8a2d8');
                ctx.fillStyle = candyGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 10, 0, Math.PI * 2);
                ctx.fill();

                // 高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(-4, -4, 4, 0, Math.PI * 2);
                ctx.fill();
            }

            drawHazelnut(ctx) {
                // 榛子发光
                const glowGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 30);
                glowGradient.addColorStop(0, 'rgba(139, 69, 19, 0.3)');
                glowGradient.addColorStop(1, 'rgba(139, 69, 19, 0)');
                ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 30, 0, Math.PI * 2);
                ctx.fill();

                // 榛子壳（椭圆形）
                const shellGradient = ctx.createRadialGradient(-3, -3, 0, 0, 0, 15);
                shellGradient.addColorStop(0, '#d2a679');
                shellGradient.addColorStop(0.5, '#b8956a');
                shellGradient.addColorStop(1, '#8b6f47');
                ctx.fillStyle = shellGradient;
                ctx.beginPath();
                ctx.ellipse(0, 0, 12, 14, 0, 0, Math.PI * 2);
                ctx.fill();

                // 榛子纹理（竖线）
                ctx.strokeStyle = 'rgba(101, 67, 33, 0.4)';
                ctx.lineWidth = 1;
                for (let i = -8; i <= 8; i += 3) {
                    ctx.beginPath();
                    ctx.moveTo(i, -10);
                    ctx.lineTo(i, 10);
                    ctx.stroke();
                }

                // 顶部尖端
                const tipGradient = ctx.createRadialGradient(0, -12, 0, 0, -14, 4);
                tipGradient.addColorStop(0, '#8b6f47');
                tipGradient.addColorStop(1, '#654321');
                ctx.fillStyle = tipGradient;
                ctx.beginPath();
                ctx.moveTo(0, -14);
                ctx.lineTo(-3, -10);
                ctx.lineTo(3, -10);
                ctx.closePath();
                ctx.fill();

                // 高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.beginPath();
                ctx.ellipse(-4, -5, 4, 6, -0.3, 0, Math.PI * 2);
                ctx.fill();
            }

            drawChocolateBar(ctx) {
                // 巧克力块发光
                const glowGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 30);
                glowGradient.addColorStop(0, 'rgba(109, 76, 65, 0.3)');
                glowGradient.addColorStop(1, 'rgba(109, 76, 65, 0)');
                ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 30, 0, Math.PI * 2);
                ctx.fill();

                // 巧克力块主体
                const chocoGradient = ctx.createLinearGradient(-12, -12, 12, 12);
                chocoGradient.addColorStop(0, '#5d4037');
                chocoGradient.addColorStop(0.3, '#6d4c41');
                chocoGradient.addColorStop(0.6, '#5d4037');
                chocoGradient.addColorStop(1, '#4e342e');
                ctx.fillStyle = chocoGradient;
                ctx.fillRect(-12, -12, 24, 24);

                // 分块纹理（2x2格子）
                ctx.strokeStyle = 'rgba(62, 39, 35, 0.6)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, -12);
                ctx.lineTo(0, 12);
                ctx.moveTo(-12, 0);
                ctx.lineTo(12, 0);
                ctx.stroke();

                // 每个格子的高光
                ctx.fillStyle = 'rgba(160, 120, 90, 0.3)';
                for (let row = 0; row < 2; row++) {
                    for (let col = 0; col < 2; col++) {
                        const x = -10 + col * 12;
                        const y = -10 + row * 12;
                        ctx.beginPath();
                        ctx.fillRect(x, y, 8, 8);
                    }
                }

                // 整体高光
                const highlightGradient = ctx.createRadialGradient(-6, -6, 0, -4, -4, 12);
                highlightGradient.addColorStop(0, 'rgba(200, 160, 120, 0.5)');
                highlightGradient.addColorStop(1, 'rgba(200, 160, 120, 0)');
                ctx.fillStyle = highlightGradient;
                ctx.fillRect(-12, -12, 24, 24);
            }

            drawMatchaCookie(ctx) {
                // 抹茶饼干发光
                const glowGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 30);
                glowGradient.addColorStop(0, 'rgba(123, 205, 50, 0.3)');
                glowGradient.addColorStop(1, 'rgba(123, 205, 50, 0)');
                ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 30, 0, Math.PI * 2);
                ctx.fill();

                // 饼干主体
                const cookieGradient = ctx.createRadialGradient(-3, -3, 0, 0, 0, 14);
                cookieGradient.addColorStop(0, '#a8d58a');
                cookieGradient.addColorStop(0.5, '#8cc074');
                cookieGradient.addColorStop(1, '#6fa854');
                ctx.fillStyle = cookieGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 14, 0, Math.PI * 2);
                ctx.fill();

                // 饼干边缘（锯齿状）
                ctx.strokeStyle = '#5fa826';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                for (let i = 0; i < 12; i++) {
                    const angle = (i / 12) * Math.PI * 2;
                    const r = 14 + (i % 2 === 0 ? 1 : -1);
                    const x = Math.cos(angle) * r;
                    const y = Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();

                // 抹茶粉纹理（小圆点）
                ctx.fillStyle = 'rgba(95, 168, 38, 0.5)';
                for (let i = 0; i < 8; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const r = Math.random() * 8;
                    const x = Math.cos(angle) * r;
                    const y = Math.sin(angle) * r;
                    ctx.beginPath();
                    ctx.arc(x, y, 1, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.beginPath();
                ctx.arc(-5, -5, 4, 0, Math.PI * 2);
                ctx.fill();
            }

            drawTeaLeaf(ctx) {
                // 茶叶发光
                const glowGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 25);
                glowGradient.addColorStop(0, 'rgba(107, 142, 35, 0.4)');
                glowGradient.addColorStop(1, 'rgba(107, 142, 35, 0)');
                ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 25, 0, Math.PI * 2);
                ctx.fill();

                // 茶叶主体（椭圆叶片）
                const leafGradient = ctx.createLinearGradient(-8, -12, 8, 12);
                leafGradient.addColorStop(0, '#8cc074');
                leafGradient.addColorStop(0.3, '#7bcd32');
                leafGradient.addColorStop(0.6, '#6fa854');
                leafGradient.addColorStop(1, '#5fa826');
                ctx.fillStyle = leafGradient;
                ctx.beginPath();
                ctx.ellipse(0, 0, 8, 14, 0.2, 0, Math.PI * 2);
                ctx.fill();

                // 叶脉（中间主脉）
                ctx.strokeStyle = 'rgba(95, 168, 38, 0.6)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(0, -12);
                ctx.lineTo(0, 12);
                ctx.stroke();

                // 叶脉（侧脉）
                ctx.lineWidth = 1;
                for (let i = -8; i <= 8; i += 4) {
                    if (i === 0) continue;
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(6, i + 2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(-6, i + 2);
                    ctx.stroke();
                }

                // 叶尖
                ctx.fillStyle = '#5fa826';
                ctx.beginPath();
                ctx.moveTo(0, -14);
                ctx.lineTo(-3, -10);
                ctx.lineTo(3, -10);
                ctx.closePath();
                ctx.fill();

                // 高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.ellipse(-3, -6, 3, 5, 0.2, 0, Math.PI * 2);
                ctx.fill();
            }

            checkCollision(playerX, playerY, playerWidth, playerHeight) {
                if (this.collected) return false;

                const dx = playerX + playerWidth / 2 - this.x;
                const dy = playerY + playerHeight / 2 - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                return dist < 35;
            }
        }

        // ==================== 危险物类 ====================
        class Hazard {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.time = Math.random() * Math.PI * 2;
            }

            update(time) {
                this.time += 0.05;
            }

            draw(ctx, cameraX) {
                const screenX = this.x - cameraX;
                if (screenX < -50 || screenX > ctx.canvas.width + 50) return;

                ctx.save();
                ctx.translate(screenX, this.y);

                // 绘制尖刺
                const spikeHeight = 30;
                const spikeWidth = 20;

                // 阴影
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.beginPath();
                ctx.ellipse(0, spikeHeight + 5, spikeWidth / 2, 5, 0, 0, Math.PI * 2);
                ctx.fill();

                // 尖刺主体
                const gradient = ctx.createLinearGradient(0, 0, 0, spikeHeight);
                gradient.addColorStop(0, '#ff4444');
                gradient.addColorStop(0.5, '#cc0000');
                gradient.addColorStop(1, '#990000');
                ctx.fillStyle = gradient;

                ctx.beginPath();
                ctx.moveTo(0, 0 + Math.sin(this.time) * 2);
                ctx.lineTo(-spikeWidth / 2, spikeHeight);
                ctx.lineTo(spikeWidth / 2, spikeHeight);
                ctx.closePath();
                ctx.fill();

                // 高光
                ctx.fillStyle = 'rgba(255, 100, 100, 0.6)';
                ctx.beginPath();
                ctx.moveTo(0, 5 + Math.sin(this.time) * 2);
                ctx.lineTo(-3, 15);
                ctx.lineTo(3, 15);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }

            checkCollision(playerX, playerY, playerWidth, playerHeight) {
                return playerX + playerWidth > this.x - 10 &&
                       playerX < this.x + 10 &&
                       playerY + playerHeight > this.y &&
                       playerY < this.y + 30;
            }
        }

        // ==================== 玩家类 ====================
        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 40;
                this.height = 50;
                this.speed = 6;
                this.velX = 0;
                this.velY = 0;
                this.jumping = false;
                this.grounded = false;
                this.gravity = 0.7;
                this.jumpPower = 15;
                this.friction = 0.85;
                this.direction = 1;

                // 动画状态
                this.walkCycle = 0;
                this.breatheCycle = 0;
                this.landingSquish = 0;
                this.lastGrounded = false;

                // 形象混合
                this.morphRatio = 0; // 0=奶油, 1=巧克力, 2=抹茶
            }

            update(keys, platforms) {
                // 移动输入
                if (keys['ArrowLeft'] || keys['a']) {
                    this.velX -= 1;
                    this.direction = -1;
                }
                if (keys['ArrowRight'] || keys['d']) {
                    this.velX += 1;
                    this.direction = 1;
                }

                this.velX *= this.friction;
                this.x += this.velX;

                // 重力
                this.velY += this.gravity;
                this.y += this.velY;

                // 限速
                if (Math.abs(this.velX) > this.speed) {
                    this.velX = this.speed * Math.sign(this.velX);
                }

                // 平台碰撞
                this.grounded = false;
                let standingPlatform = null;

                platforms.forEach((platform) => {
                    if (this.x + this.width > platform.x &&
                        this.x < platform.x + platform.width &&
                        this.y + this.height > platform.y &&
                        this.y + this.height < platform.y + platform.height &&
                        this.velY >= 0) {

                        this.y = platform.y - this.height;
                        this.velY = 0;
                        this.grounded = true;
                        this.jumping = false;
                        standingPlatform = platform;

                        // 着陆效果
                        if (!this.lastGrounded) {
                            this.landingSquish = 10;
                            return true; // 信号产生着陆粒子
                        }
                    }
                });

                // 如果站在移动平台上，跟随平台移动
                if (standingPlatform && standingPlatform.moving) {
                    const deltaX = standingPlatform.x - standingPlatform.lastX;
                    const deltaY = standingPlatform.y - standingPlatform.lastY;
                    this.x += deltaX;
                    this.y += deltaY;
                }

                this.lastGrounded = this.grounded;

                // 动画更新
                if (Math.abs(this.velX) > 0.5 && this.grounded) {
                    this.walkCycle += 0.3;
                }
                this.breatheCycle += 0.05;
                if (this.landingSquish > 0) {
                    this.landingSquish -= 0.5;
                }

                // 更新形象混合比例（平滑过渡）
                let targetMorph = 0;
                if (this.x > 5500) {
                    targetMorph = 2; // 抹茶
                } else if (this.x > 5100) {
                    // 过渡区域 5100-5500 (巧克力->抹茶)
                    targetMorph = 1 + (this.x - 5100) / 400;
                } else if (this.x > 3200) {
                    targetMorph = 1; // 巧克力
                } else if (this.x > 2800) {
                    // 过渡区域 2800-3200 (奶油->巧克力)
                    targetMorph = (this.x - 2800) / 400;
                }

                this.morphRatio += (targetMorph - this.morphRatio) * 0.1;

                return false;
            }

            jump() {
                if (this.grounded && !this.jumping) {
                    this.jumping = true;
                    this.velY = -this.jumpPower;
                    this.grounded = false;
                    return true; // 信号产生跳跃粒子
                }
                return false;
            }

            getParticleColor() {
                // 根据玩家位置返回对应场景的粒子颜色（支持平滑过渡）
                if (this.x > 5500) {
                    // 抹茶区
                    return '#8cc074';
                } else if (this.x > 5100) {
                    // 巧克力到抹茶过渡区
                    const ratio = (this.x - 5100) / 400;
                    return Utils.lerpColor('#8d6e63', '#8cc074', ratio);
                } else if (this.x > 3200) {
                    // 巧克力区
                    return '#8d6e63';
                } else if (this.x > 2800) {
                    // 奶油到巧克力过渡区
                    const ratio = (this.x - 2800) / 400;
                    return Utils.lerpColor('#ffd1dc', '#8d6e63', ratio);
                } else {
                    // 奶油区
                    return '#ffd1dc';
                }
            }

            draw(ctx, cameraX, time) {
                const screenX = this.x - cameraX;
                const centerX = screenX + this.width / 2;
                const centerY = this.y + this.height / 2;

                // 应用着陆压缩效果
                const squish = this.landingSquish / 10;

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.scale(1 + squish * 0.2, 1 - squish * 0.3);
                ctx.translate(-centerX, -centerY);

                // 根据混合比例绘制
                if (this.morphRatio < 1) {
                    // 奶油到巧克力的过渡
                    this.drawMorphedCharacter(ctx, centerX, centerY, 'cream', 'chocolate', this.morphRatio);
                } else if (this.morphRatio < 2) {
                    // 巧克力到抹茶的过渡
                    this.drawMorphedCharacter(ctx, centerX, centerY, 'chocolate', 'matcha', this.morphRatio - 1);
                } else {
                    // 纯抹茶
                    this.drawMorphedCharacter(ctx, centerX, centerY, 'matcha', 'matcha', 0);
                }

                ctx.restore();
            }

            drawMorphedCharacter(ctx, centerX, centerY, theme1, theme2, ratio) {
                const themes = {
                    cream: {
                        body: '#fffef7',
                        bodyLight: '#ffffff',
                        bodyDark: '#fef9e7',
                        head: '#ffd1e8',
                        accent: '#ff6b9d',
                        headType: 'cake'
                    },
                    chocolate: {
                        body: '#6d4c41',
                        bodyLight: '#8d6e63',
                        bodyDark: '#5d4037',
                        head: '#5d4037',
                        accent: '#ffd700',
                        headType: 'cake'
                    },
                    matcha: {
                        body: '#8cc074',
                        bodyLight: '#a8d58a',
                        bodyDark: '#6fa854',
                        head: '#7bcd32',
                        accent: '#5fa826',
                        headType: 'donut'
                    }
                };

                const color1 = themes[theme1];
                const color2 = themes[theme2];

                // 混合颜色
                const bodyColor = Utils.lerpColor(color1.body, color2.body, ratio);
                const bodyLight = Utils.lerpColor(color1.bodyLight, color2.bodyLight, ratio);
                const bodyDark = Utils.lerpColor(color1.bodyDark, color2.bodyDark, ratio);
                const headColor = Utils.lerpColor(color1.head, color2.head, ratio);
                const accentColor = Utils.lerpColor(color1.accent, color2.accent, ratio);

                // 呼吸效果
                const breathe = Math.sin(this.breatheCycle) * 2;

                ctx.save();

                // === 身体 ===
                const bodyGradient = ctx.createRadialGradient(
                    centerX - 4, centerY - 4 + breathe, 0,
                    centerX, centerY + breathe, 16
                );
                bodyGradient.addColorStop(0, bodyLight);
                bodyGradient.addColorStop(0.7, bodyColor);
                bodyGradient.addColorStop(1, bodyDark);
                ctx.fillStyle = bodyGradient;
                ctx.beginPath();
                ctx.arc(centerX, centerY + 5 + breathe, 16, 0, Math.PI * 2);
                ctx.fill();

                // 身体高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.ellipse(centerX - 5, centerY + breathe, 7, 5, -0.3, 0, Math.PI * 2);
                ctx.fill();

                // === 头部 ===
                ctx.save();
                ctx.translate(centerX, centerY - 22);

                // 判断头部类型
                let headType = 'cake'; // 默认蛋糕

                if ((theme2 === 'matcha' && ratio > 0.5) || (theme1 === 'matcha' && theme2 === 'matcha')) {
                    headType = 'donut'; // 抹茶甜甜圈
                } else if ((theme1 === 'chocolate' && theme2 === 'chocolate') ||
                           (theme1 === 'cream' && theme2 === 'chocolate' && ratio > 0.5) ||
                           (theme1 === 'chocolate' && theme2 === 'matcha' && ratio < 0.5)) {
                    headType = 'chocolate'; // 巧克力块
                }

                if (headType === 'donut') {
                    this.drawDonutHead(ctx, headColor, accentColor, bodyColor);
                } else if (headType === 'chocolate') {
                    this.drawChocolateBlockHead(ctx, headColor, accentColor);
                } else {
                    this.drawCakeHead(ctx, headColor, accentColor, bodyColor);
                }

                ctx.restore();

                // === 手臂（带行走动画） ===
                const armSwing = Math.sin(this.walkCycle) * 0.3;
                ctx.strokeStyle = bodyColor;
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';

                // 左臂
                ctx.beginPath();
                ctx.moveTo(centerX - 14, centerY + 2);
                ctx.lineTo(centerX - 22, centerY + 10 + armSwing * 10);
                ctx.stroke();

                // 右臂
                ctx.beginPath();
                ctx.moveTo(centerX + 14, centerY + 2);
                ctx.lineTo(centerX + 22, centerY + 10 - armSwing * 10);
                ctx.stroke();

                // === 腿部（带行走动画） ===
                const legSwing = Math.sin(this.walkCycle) * 0.4;

                // 左腿
                ctx.beginPath();
                ctx.moveTo(centerX - 6, centerY + 18);
                ctx.lineTo(centerX - 10 - legSwing * 5, centerY + 33);
                ctx.stroke();

                // 右腿
                ctx.beginPath();
                ctx.moveTo(centerX + 6, centerY + 18);
                ctx.lineTo(centerX + 10 + legSwing * 5, centerY + 33);
                ctx.stroke();

                ctx.restore();
            }

            drawCakeHead(ctx, headColor, accentColor, bodyColor) {
                // 蛋糕体
                const headGradient = ctx.createLinearGradient(-12, -5, 12, -5);
                headGradient.addColorStop(0, headColor);
                headGradient.addColorStop(0.5, bodyColor);
                headGradient.addColorStop(1, headColor);
                ctx.fillStyle = headGradient;
                ctx.beginPath();
                ctx.roundRect(-12, -5, 24, 13, 3);
                ctx.fill();

                // 装饰（顶部点缀）
                ctx.fillStyle = accentColor;
                ctx.beginPath();
                ctx.arc(0, -11, 3, 0, Math.PI * 2);
                ctx.fill();

                // 高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(-1, -12, 1.2, 0, Math.PI * 2);
                ctx.fill();
            }

            drawDonutHead(ctx, headColor, accentColor, bodyColor) {
                // 甜甜圈主体（外圈）
                const donutGradient = ctx.createRadialGradient(-2, -2, 2, 0, 0, 12);
                donutGradient.addColorStop(0, '#d4a373');
                donutGradient.addColorStop(0.5, '#c19a6b');
                donutGradient.addColorStop(1, '#a67c52');
                ctx.fillStyle = donutGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 12, 0, Math.PI * 2);
                ctx.arc(0, 0, 5, 0, Math.PI * 2, true);
                ctx.fill();

                // 抹茶糖霜（流淌效果）
                ctx.save();
                ctx.beginPath();
                ctx.arc(0, 0, 12, 0, Math.PI * 2);
                ctx.arc(0, 0, 5, 0, Math.PI * 2, true);
                ctx.clip();

                const glazeGradient = ctx.createLinearGradient(0, -12, 0, 0);
                glazeGradient.addColorStop(0, headColor);
                glazeGradient.addColorStop(0.6, accentColor);
                glazeGradient.addColorStop(1, 'rgba(123, 205, 50, 0.7)');
                ctx.fillStyle = glazeGradient;

                ctx.beginPath();
                ctx.moveTo(-12, -5);
                for (let i = 0; i <= 8; i++) {
                    const angle = (i / 8) * Math.PI * 2 - Math.PI / 2;
                    const r = 12;
                    const x = Math.cos(angle) * r;
                    const y = Math.sin(angle) * r + Math.sin(i * 0.9) * 2 - 3;
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.lineTo(12, 12);
                ctx.lineTo(-12, 12);
                ctx.closePath();
                ctx.fill();
                ctx.restore();

                // 内圈阴影
                const innerGradient = ctx.createRadialGradient(0, 0, 5, 0, 0, 7);
                innerGradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
                innerGradient.addColorStop(1, 'rgba(0, 0, 0, 0.2)');
                ctx.fillStyle = innerGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 7, 0, Math.PI * 2);
                ctx.fill();

                // 白色糖粒装饰
                const sprinkleCount = 10;
                for (let i = 0; i < sprinkleCount; i++) {
                    const angle = (i / sprinkleCount) * Math.PI * 2 + this.breatheCycle * 0.1;
                    const r = 8 + Math.sin(i * 2) * 2;
                    const x = Math.cos(angle) * r;
                    const y = Math.sin(angle) * r;

                    // 糖粒
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                    ctx.beginPath();
                    ctx.arc(x, y, 1, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 整体高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.beginPath();
                ctx.ellipse(-4, -5, 4, 2, -0.5, 0, Math.PI * 2);
                ctx.fill();
            }

            drawChocolateBlockHead(ctx, headColor, accentColor) {
                // 巧克力块主体（方形）
                const chocoGradient = ctx.createLinearGradient(-10, -10, 10, 10);
                chocoGradient.addColorStop(0, '#5d4037');
                chocoGradient.addColorStop(0.3, headColor);
                chocoGradient.addColorStop(0.6, '#5d4037');
                chocoGradient.addColorStop(1, '#4e342e');
                ctx.fillStyle = chocoGradient;
                ctx.fillRect(-10, -10, 20, 18);

                // 分块纹理（十字线）
                ctx.strokeStyle = 'rgba(62, 39, 35, 0.7)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, -10);
                ctx.lineTo(0, 8);
                ctx.moveTo(-10, -1);
                ctx.lineTo(10, -1);
                ctx.stroke();

                // 每个格子的高光
                ctx.fillStyle = 'rgba(141, 110, 99, 0.3)';
                for (let row = 0; row < 2; row++) {
                    for (let col = 0; col < 2; col++) {
                        const x = -8 + col * 10;
                        const y = -8 + row * 10;
                        ctx.beginPath();
                        ctx.fillRect(x, y, 6, 6);
                    }
                }

                // 整体高光
                const highlightGradient = ctx.createRadialGradient(-5, -6, 0, -3, -4, 10);
                highlightGradient.addColorStop(0, 'rgba(180, 140, 110, 0.6)');
                highlightGradient.addColorStop(1, 'rgba(180, 140, 110, 0)');
                ctx.fillStyle = highlightGradient;
                ctx.fillRect(-10, -10, 20, 18);

                // 顶部装饰（金色可可豆）
                ctx.fillStyle = accentColor;
                ctx.beginPath();
                ctx.ellipse(0, -12, 2.5, 3, 0, 0, Math.PI * 2);
                ctx.fill();

                // 可可豆高光
                ctx.fillStyle = 'rgba(255, 255, 200, 0.6)';
                ctx.beginPath();
                ctx.arc(-0.5, -13, 1, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ==================== 相机类 ====================
        class Camera {
            constructor() {
                this.x = 0;
                this.y = 0;
                this.smoothness = 0.1;
                this.shake = 0;
                this.shakeDecay = 0.9;
            }

            update(targetX, targetY, canvasWidth) {
                const idealX = targetX - canvasWidth / 3;
                this.x += (idealX - this.x) * this.smoothness;

                // 抖动
                if (this.shake > 0) {
                    this.x += (Math.random() - 0.5) * this.shake;
                    this.y += (Math.random() - 0.5) * this.shake;
                    this.shake *= this.shakeDecay;
                    if (this.shake < 0.1) this.shake = 0;
                }
            }

            addShake(amount) {
                this.shake = Math.max(this.shake, amount);
            }
        }

        // ==================== 背景类 ====================
        class Background {
            constructor(canvasWidth, canvasHeight) {
                this.stars = [];
                this.layers = [
                    { parallax: 0.1, count: 30 },
                    { parallax: 0.2, count: 30 },
                    { parallax: 0.3, count: 20 }
                ];

                // 初始化星星
                this.layers.forEach(layer => {
                    for (let i = 0; i < layer.count; i++) {
                        this.stars.push({
                            x: Math.random() * 8000,
                            y: Math.random() * canvasHeight,
                            size: Math.random() * 3 + 1,
                            parallax: layer.parallax,
                            twinkle: Math.random() * Math.PI * 2,
                            speed: Math.random() * 0.3 + 0.1
                        });
                    }
                });
            }

            update() {
                this.stars.forEach(star => {
                    star.twinkle += 0.05;
                    star.y += star.speed;
                    if (star.y > 700) {
                        star.y = 0;
                        star.x = Math.random() * 8000;
                    }
                });
            }

            draw(ctx, cameraX, playerX) {
                // 计算背景颜色（根据场景）
                const sceneIndex = CONFIG.scenes.findIndex(s => playerX >= s.start && playerX < s.end);
                const scene = sceneIndex >= 0 ? CONFIG.scenes[sceneIndex] : null;
                let bgColors;

                if (scene && scene.name === 'transition') {
                    // 过渡区域：混合颜色
                    const prevScene = CONFIG.scenes[sceneIndex - 1];
                    const nextScene = CONFIG.scenes[sceneIndex + 1];

                    if (prevScene && nextScene && prevScene.bgColors && nextScene.bgColors) {
                        const ratio = (playerX - scene.start) / (scene.end - scene.start);
                        bgColors = prevScene.bgColors.map((color, i) =>
                            Utils.lerpColor(color, nextScene.bgColors[i], ratio)
                        );
                    } else {
                        // 如果没有相邻场景，使用默认颜色
                        bgColors = CONFIG.scenes[0].bgColors;
                    }
                } else if (scene && scene.bgColors) {
                    bgColors = scene.bgColors;
                } else {
                    bgColors = CONFIG.scenes[0].bgColors;
                }

                // 绘制渐变背景
                const gradient = ctx.createLinearGradient(0, 0, 0, ctx.canvas.height);
                bgColors.forEach((color, i) => {
                    gradient.addColorStop(i * 0.5, color);
                });
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);

                // 绘制星星（多层视差）
                this.stars.forEach(star => {
                    const screenX = star.x - cameraX * star.parallax;
                    if (screenX > -20 && screenX < ctx.canvas.width + 20) {
                        const alpha = 0.3 + Math.sin(star.twinkle) * 0.3;
                        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                        ctx.beginPath();
                        ctx.arc(screenX, star.y, star.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
            }
        }

        // ==================== 游戏主类 ====================
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');

                this.time = 0;
                this.running = true;
                this.keys = {};
                this.score = 0;
                this.combo = 0;
                this.comboTimer = 0;
                this.comboMaxTime = 180; // 3秒

                // 游戏对象
                this.player = new Player(100, 500);
                this.camera = new Camera();
                this.background = new Background(this.canvas.width, this.canvas.height);
                this.particleSystem = new ParticleSystem();

                // 创建游戏对象
                this.platforms = CONFIG.platforms.map(p => new Platform(p));
                this.collectibles = [
                    ...CONFIG.collectibles.bows.map(b => new Collectible(b.x, b.y, 'bow', b.theme)),
                    ...CONFIG.collectibles.candies.map(c => new Collectible(c.x, c.y, 'candy', c.theme))
                ];
                this.hazards = CONFIG.hazards.map(h => new Hazard(h.x, h.y, h.type));

                this.setupEventListeners();
                this.gameLoop();
            }

            setupEventListeners() {
                document.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                    this.keys[e.key.toLowerCase()] = true;

                    if ((e.key === ' ' || e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp')) {
                        if (this.player.jump()) {
                            this.particleSystem.emit(
                                this.player.x + this.player.width / 2,
                                this.player.y + this.player.height,
                                20,
                                this.player.getParticleColor()
                            );
                        }
                    }

                    if (e.key === 'Escape') {
                        this.running = !this.running;
                    }
                });

                document.addEventListener('keyup', (e) => {
                    this.keys[e.key] = false;
                    this.keys[e.key.toLowerCase()] = false;
                });
            }

            update() {
                if (!this.running) return;

                this.time++;

                // 先更新平台（在玩家之前）
                this.platforms.forEach(p => p.update(this.time));

                // 更新玩家
                const landed = this.player.update(this.keys, this.platforms);
                if (landed) {
                    this.particleSystem.emit(
                        this.player.x + this.player.width / 2,
                        this.player.y + this.player.height,
                        15,
                        this.player.getParticleColor()
                    );
                    this.camera.addShake(3);
                }

                // 更新收集物
                this.collectibles.forEach(c => {
                    c.update(
                        this.time,
                        this.player.x + this.player.width / 2,
                        this.player.y + this.player.height / 2
                    );

                    // 检测碰撞
                    if (c.checkCollision(this.player.x, this.player.y, this.player.width, this.player.height)) {
                        c.collected = true; // 标记为已收集！
                        const points = c.type === 'bow' ? 150 : 100;
                        this.addScore(points);
                        this.addCombo();
                        this.particleSystem.emit(c.x, c.y, 30, c.type === 'bow' ? '#ff9ece' : '#c8a2d8');
                        this.camera.addShake(2);
                    }
                });

                // 更新危险物
                this.hazards.forEach(h => {
                    h.update(this.time);
                    if (h.checkCollision(this.player.x, this.player.y, this.player.width, this.player.height)) {
                        this.gameOver();
                    }
                });

                // 更新粒子
                this.particleSystem.update();

                // 更新背景
                this.background.update();

                // 更新相机
                this.camera.update(this.player.x, this.player.y, this.canvas.width);

                // 更新combo计时器
                if (this.combo > 0) {
                    this.comboTimer++;
                    if (this.comboTimer > this.comboMaxTime) {
                        this.resetCombo();
                    }
                }

                // 更新进度条
                const progress = Math.min(100, (this.player.x / CONFIG.finishLine) * 100);
                document.getElementById('progressFill').style.width = progress + '%';

                // 检查掉落
                if (this.player.y > this.canvas.height + 100) {
                    this.gameOver();
                }

                // 检查终点
                if (this.player.x > CONFIG.finishLine) {
                    this.addScore(1000);
                    this.gameOver();
                }
            }

            draw() {
                // 绘制背景
                this.background.draw(this.ctx, this.camera.x, this.player.x);

                // 绘制平台
                this.platforms.forEach(p => p.draw(this.ctx, this.camera.x, this.time));

                // 绘制收集物
                this.collectibles.forEach(c => c.draw(this.ctx, this.camera.x));

                // 绘制危险物
                this.hazards.forEach(h => h.draw(this.ctx, this.camera.x));

                // 绘制玩家
                this.player.draw(this.ctx, this.camera.x, this.time);

                // 绘制粒子
                this.particleSystem.draw(this.ctx, this.camera.x);
            }

            addScore(points) {
                const comboMultiplier = Math.min(1 + this.combo * 0.1, 3);
                this.score += Math.floor(points * comboMultiplier);
                document.getElementById('scoreValue').textContent = this.score;
            }

            addCombo() {
                this.combo++;
                this.comboTimer = 0;
                document.getElementById('comboValue').textContent = this.combo;
                document.getElementById('combo').classList.add('show');
            }

            resetCombo() {
                this.combo = 0;
                this.comboTimer = 0;
                document.getElementById('combo').classList.remove('show');
            }

            gameOver() {
                this.running = false;
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('gameOver').classList.add('show');
            }

            restart() {
                this.running = true;
                this.score = 0;
                this.combo = 0;
                this.comboTimer = 0;
                this.time = 0;

                this.player = new Player(100, 500);
                this.camera = new Camera();
                this.particleSystem = new ParticleSystem();

                this.platforms = CONFIG.platforms.map(p => new Platform(p));
                this.collectibles = [
                    ...CONFIG.collectibles.bows.map(b => new Collectible(b.x, b.y, 'bow', b.theme)),
                    ...CONFIG.collectibles.candies.map(c => new Collectible(c.x, c.y, 'candy', c.theme))
                ];
                this.hazards = CONFIG.hazards.map(h => new Hazard(h.x, h.y, h.type));

                document.getElementById('scoreValue').textContent = '0';
                document.getElementById('gameOver').classList.remove('show');
                document.getElementById('combo').classList.remove('show');
                document.getElementById('progressFill').style.width = '0%';
            }

            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }

        // 启动游戏
        const game = new Game();
    </script>
